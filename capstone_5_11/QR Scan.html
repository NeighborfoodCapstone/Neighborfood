<style>

    background:
      radial-gradient(ellipse 60% 70% at 50% 40%, rgba(255,255,255,.04) 0%, transparent 60%),
      linear-gradient(135deg, #1a1f1c, #0f1410 60%, #1a1f1c);

<script>
const API_BASE = "http://127.0.0.1:8000";

const API_ENDPOINTS = {
  request: `${API_BASE}/api/qr/request`,
  verify: `${API_BASE}/api/qr/verify`,
  history: `${API_BASE}/api/qr/history`,
};

let currentMode = "scan";
let qrScanner = null;
let lastIssuedToken = "";
let lastIssuedVerifyUrl = "";

const heroCopy = {
  scan: ["상대방 QR을 스캔해 거래를 확정하세요", "토큰 URL과 raw token을 모두 처리합니다", "QR을 사각형 안에 맞춰주세요", "인식 대기 중"],
  issue: ["거래용 인증 QR을 발급하세요", "SQLite에는 token hash와 만료시간만 저장하는 구조입니다", "발급된 QR이 여기에 표시됩니다", "발급 대기 중"],
  history: ["최근 인증 이력을 확인하세요", "ISSUED / VERIFIED / EXPIRED 상태를 한 화면에서 봅니다", "이력 요약 모드입니다", "이력 조회 중"],
};

async function apiFetch(url, options = {}) {
  const response = await fetch(url, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(options.headers || {}),
    },
  });

  let data = null;
  try {
    data = await response.json();
  } catch {
    data = { ok: false, message: "서버 응답을 JSON으로 읽지 못했습니다." };
  }

  if (!response.ok) {
    throw new Error(data.detail || data.message || `HTTP ${response.status}`);
  }

  return data;
}

function formatTime(value) {
  if (!value) return "-";
  try {
    return new Intl.DateTimeFormat("ko-KR", {
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
    }).format(new Date(value));
  } catch {
    return value;
  }
}

function normalizeVerifyStatus(status) {
  if (!status) return "not_found";
  const value = String(status).toLowerCase();
  if (value === "verified") return "verified";
  if (value === "already_used") return "already_used";
  if (value === "expired") return "expired";
  if (value === "not_found" || value === "invalid_input") return "not_found";
  if (value === "issued") return "not_found";
  return value;
}

function normalizeHistoryStatus(status) {
  if (!status) return "ISSUED";
  return String(status).toUpperCase();
}

function statusClass(status) {
  const value = normalizeHistoryStatus(status);
  if (value === "VERIFIED") return "bg-green-50 border-green-200 text-primary";
  if (value === "EXPIRED") return "bg-rose-50 border-rose-200 text-danger";
  return "bg-amber-50 border-amber-200 text-secondary";
}

function statusLabel(status) {
  const value = normalizeHistoryStatus(status);
  return { ISSUED: "발급됨", VERIFIED: "검증 완료", EXPIRED: "만료됨" }[value] || value;
}

function setMode(mode) {
  currentMode = mode;

  document.querySelectorAll(".mode-btn").forEach((btn) => {
    const active = btn.dataset.mode === mode;
    btn.className = active
      ? "mode-btn px-4 py-1.5 rounded-full bg-white text-on-surface text-[12px] font-bold"
      : "mode-btn px-4 py-1.5 rounded-full text-white/80 text-[12px] font-semibold";
  });

  document.querySelectorAll(".panel").forEach((panel) => panel.classList.remove("active"));
  document.getElementById(`panel-${mode}`).classList.add("active");

  const copy = heroCopy[mode];
  document.getElementById("heroTitle").textContent = copy[0];
  document.getElementById("heroDesc").textContent = copy[1];
  document.getElementById("frameHint").textContent = copy[2];
  document.getElementById("statusText").textContent = copy[3];

  const fake = document.getElementById("fakeQrPattern");
  const canvas = document.getElementById("issuedQrCanvas");
  const reader = document.getElementById("qr-reader");
  const line = document.getElementById("scanLine");

  if (mode === "issue" && lastIssuedToken) {
    fake.classList.add("hidden");
    reader.classList.add("hidden");
    canvas.classList.remove("hidden");
    line.classList.add("hidden");
  } else {
    fake.classList.remove("hidden");
    reader.classList.add("hidden");
    if (mode !== "issue") canvas.classList.add("hidden");
    line.classList.toggle("hidden", mode === "history");
  }

  if (mode === "history") renderHistory();
}

async function issueSession({ subjectId, purpose, ttlSeconds }) {
  const data = await apiFetch(API_ENDPOINTS.request, {
    method: "POST",
    body: JSON.stringify({ subjectId, purpose, ttlSeconds }),
  });

  if (!data.ok || !data.session) {
    throw new Error(data.message || "QR 발급에 실패했습니다.");
  }

  return data.session;
}

async function drawIssuedQr(session) {
  const canvas = document.getElementById("issuedQrCanvas");
  const qrValue = session.verifyUrl || `${API_BASE}/api/qr/verify/${encodeURIComponent(session.token)}`;

  if (window.QRCode?.toCanvas) {
    await QRCode.toCanvas(canvas, qrValue, {
      width: 240,
      margin: 1,
      color: { dark: "#005313", light: "#ffffff" },
      errorCorrectionLevel: "M",
    });
  }
}

function showIssueResult(session) {
  const box = document.getElementById("issueResult");
  box.classList.remove("hidden");
  box.innerHTML = `
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="font-extrabold text-on-surface">QR 생성 완료</p>
        <p class="mt-1">ID: <b>${session.subjectId}</b> · ${session.purpose}</p>
      </div>
      <span class="rounded-full bg-green-100 px-2.5 py-1 text-[10px] font-extrabold text-primary">${session.status}</span>
    </div>
    <div class="mt-2 grid gap-1">
      <p>만료: ${formatTime(session.expiresAt)}</p>
      <p class="break-all">token: ${session.token}</p>
      <p class="break-all">verify URL: ${session.verifyUrl || "-"}</p>
    </div>
  `;
}

async function handleIssueSubmit(event) {
  event.preventDefault();

  const subjectId = document.getElementById("subjectId").value.trim();
  const purpose = document.getElementById("purpose").value;
  const ttlSeconds = Number(document.getElementById("ttlSeconds").value);

  if (!subjectId || subjectId.length < 2) {
    alert("거래/사용자 ID를 입력하세요.");
    return;
  }

  try {
    document.getElementById("statusText").textContent = "QR 생성 중...";
    const session = await issueSession({ subjectId, purpose, ttlSeconds });

    lastIssuedToken = session.token;
    lastIssuedVerifyUrl = session.verifyUrl || "";

    await drawIssuedQr(session);
    showIssueResult(session);
    setMode("issue");

    document.getElementById("fakeQrPattern").classList.add("hidden");
    document.getElementById("issuedQrCanvas").classList.remove("hidden");
    document.getElementById("scanLine").classList.add("hidden");
    document.getElementById("statusText").textContent = "QR 발급 완료";
    await renderHistory();
  } catch (error) {
    console.error(error);
    alert(error.message || "QR 발급 중 오류가 발생했습니다.");
    document.getElementById("statusText").textContent = "QR 발급 실패";
  }
}

function showVerifyResult(result) {
  const box = document.getElementById("verifyResult");
  box.classList.remove("hidden");

  const normalizedStatus = normalizeVerifyStatus(result.status || result.result);
  const map = {
    verified: ["검증 완료", result.message || "토큰이 유효했고 방금 거래 인증 처리되었습니다.", "border-green-200 bg-green-50 text-primary"],
    already_used: ["이미 사용된 QR", result.message || "이 토큰은 이미 검증에 사용되어 재사용이 차단되었습니다.", "border-amber-200 bg-amber-50 text-secondary"],
    expired: ["만료된 QR", result.message || "토큰 만료 시간이 지났습니다. 새 QR을 다시 발급하세요.", "border-rose-200 bg-rose-50 text-danger"],
    not_found: ["유효하지 않은 QR", result.message || "저장된 인증 세션을 찾을 수 없습니다.", "border-rose-200 bg-rose-50 text-danger"],
  };

  const copy = map[normalizedStatus] || map.not_found;
  box.className = `mt-3 rounded-2xl border px-4 py-3 text-[12px] ${copy[2]}`;
  box.innerHTML = `
    <p class="font-extrabold">${copy[0]}</p>
    <p class="mt-1">${copy[1]}</p>
    <div class="mt-2 grid gap-1 text-on-surface-variant">
      <p>Subject: <b>${result.subjectId || "-"}</b></p>
      <p>Purpose: <b>${result.purpose || "-"}</b></p>
      <p>Used At: <b>${formatTime(result.usedAt)}</b></p>
    </div>
  `;
}

async function verifyToken(rawValue) {
  const value = String(rawValue || "").trim();

  if (!value) {
    showVerifyResult({ status: "not_found", message: "QR 토큰이 비어 있습니다." });
    return;
  }

  try {
    document.getElementById("statusText").textContent = "검증 중...";
    const data = await apiFetch(API_ENDPOINTS.verify, {
      method: "POST",
      body: JSON.stringify({ rawValue: value }),
    });

    const session = data.session || {};
    const status = data.result || session.status || "not_found";

    showVerifyResult({ ...session, status, result: data.result, message: data.message });

    if (status === "verified") document.getElementById("statusText").textContent = "인증 완료";
    else if (status === "already_used") document.getElementById("statusText").textContent = "이미 사용됨";
    else if (status === "expired") document.getElementById("statusText").textContent = "만료된 QR";
    else document.getElementById("statusText").textContent = "검증 실패";

    await renderHistory();
  } catch (error) {
    console.error(error);
    showVerifyResult({ status: "not_found", message: error.message || "검증 요청 중 오류가 발생했습니다." });
    document.getElementById("statusText").textContent = "검증 실패";
  }
}

async function renderHistory() {
  const list = document.getElementById("historyList");

  try {
    const data = await apiFetch(`${API_ENDPOINTS.history}?limit=8`);
    const items = data.items || [];

    if (items.length === 0) {
      list.innerHTML = `<div class="rounded-2xl bg-surface-container-low px-4 py-5 text-[12px] text-on-surface-variant">아직 발급/검증 이력이 없습니다.</div>`;
      return;
    }

    list.innerHTML = items.map((item) => `
      <div class="rounded-2xl border px-4 py-3 ${statusClass(item.status)}">
        <div class="flex items-center justify-between gap-3">
          <div class="min-w-0">
            <p class="truncate text-[13px] font-extrabold">${item.subjectId}</p>
            <p class="mt-0.5 text-[11px] text-on-surface-variant">${item.purpose} · 발급 ${formatTime(item.issuedAt)}</p>
          </div>
          <span class="shrink-0 rounded-full bg-white/70 px-2.5 py-1 text-[10px] font-extrabold">${statusLabel(item.status)}</span>
        </div>
        <p class="mt-2 text-[10.5px] text-on-surface-variant">만료 ${formatTime(item.expiresAt)} · 검증 ${formatTime(item.usedAt)}</p>
      </div>
    `).join("");
  } catch (error) {
    console.error(error);
    list.innerHTML = `<div class="rounded-2xl bg-rose-50 px-4 py-5 text-[12px] text-danger">이력 조회 실패: ${error.message || "API 서버 연결 실패"}</div>`;
  }
}

async function startCameraScanner() {
  setMode("scan");
  document.getElementById("fakeQrPattern").classList.add("hidden");
  document.getElementById("issuedQrCanvas").classList.add("hidden");
  document.getElementById("qr-reader").classList.remove("hidden");
  document.getElementById("scanLine").classList.add("hidden");
  document.getElementById("statusText").textContent = "카메라 시작 중...";

  if (!window.Html5Qrcode) {
    document.getElementById("statusText").textContent = "스캐너 라이브러리 로드 실패";
    return;
  }

  try {
    if (qrScanner) {
      await qrScanner.stop().catch(() => undefined);
      qrScanner.clear();
    }

    qrScanner = new Html5Qrcode("qr-reader");
    await qrScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 210, height: 210 }, aspectRatio: 1 },
      async (decodedText) => {
        document.getElementById("statusText").textContent = "QR 인식됨";
        await qrScanner.stop().catch(() => undefined);
        await verifyToken(decodedText);
      },
      () => undefined,
    );

    document.getElementById("statusText").textContent = "카메라 활성";
  } catch (error) {
    document.getElementById("statusText").textContent = "카메라 권한 필요";
    document.getElementById("qr-reader").classList.add("hidden");
    document.getElementById("fakeQrPattern").classList.remove("hidden");
    document.getElementById("scanLine").classList.remove("hidden");
    console.warn(error);
  }
}

document.querySelectorAll(".mode-btn").forEach((btn) => {
  btn.addEventListener("click", () => setMode(btn.dataset.mode));
});

document.getElementById("issueForm").addEventListener("submit", handleIssueSubmit);

document.getElementById("manualForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  await verifyToken(document.getElementById("manualToken").value);
});

document.getElementById("cameraBtn").addEventListener("click", startCameraScanner);

document.getElementById("keyboardBtn").addEventListener("click", () => {
  setMode("scan");
  document.getElementById("manualToken").focus();
});

document.getElementById("sampleBtn").addEventListener("click", async () => {
  setMode("issue");
  const session = await issueSession({
    subjectId: document.getElementById("subjectId").value.trim() || "pickup_demo",
    purpose: document.getElementById("purpose").value,
    ttlSeconds: Number(document.getElementById("ttlSeconds").value),
  });

  lastIssuedToken = session.token;
  lastIssuedVerifyUrl = session.verifyUrl || "";
  await drawIssuedQr(session);
  showIssueResult(session);

  document.getElementById("fakeQrPattern").classList.add("hidden");
  document.getElementById("issuedQrCanvas").classList.remove("hidden");
  document.getElementById("scanLine").classList.add("hidden");
  document.getElementById("statusText").textContent = "샘플 QR 발급 완료";
  await renderHistory();
});

document.getElementById("clearHistoryBtn").addEventListener("click", async () => {
  if (!confirm("SQLite QR 이력을 초기화할까요?")) return;

  try {
    await apiFetch(API_ENDPOINTS.history, { method: "DELETE" });
    await renderHistory();
    document.getElementById("verifyResult").classList.add("hidden");
    document.getElementById("issueResult").classList.add("hidden");
    document.getElementById("statusText").textContent = "이력 초기화";
  } catch (error) {
    alert(error.message || "이력 초기화 실패");
  }
});

document.getElementById("helpBtn").addEventListener("click", () => {
  alert("이 화면은 FastAPI + SQLite QR 인증 API와 연결됩니다. API 서버는 http://127.0.0.1:8000 에서 실행되어야 합니다.");
});

renderHistory();

</script>
</body>
</html>
