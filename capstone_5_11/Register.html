<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>등록 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: {
    primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77',
    'on-primary':'#fff','on-primary-fixed-variant':'#005313',
    'primary-container':'#4caf50','on-primary-container':'#003c0b',
    secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed':'#ffdcbe','secondary-fixed-dim':'#ffb870',
    'on-secondary-container':'#653900','on-secondary-fixed-variant':'#693c00',
    tertiary:'#466270','tertiary-container':'#829fae','tertiary-fixed':'#c9e7f7','tertiary-fixed-dim':'#adcbda',
    'on-tertiary-container':'#183642',
    'surface-container-lowest':'#fff','surface-container-low':'#f3f4f5','surface-container':'#edeeef','surface-container-high':'#e7e8e9',
    'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',
    outline:'#6f7a6b','outline-variant':'#becab9'
  }, fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] } }}}
</script>
<style>
  body { background: #faf9f5; min-height: max(884px,100dvh); }
  .opt { transition: transform .15s ease, box-shadow .2s ease, background-color .2s ease; }
  .opt:active { transform: scale(.985); }
</style>
</head>
<body class="text-on-surface antialiased pb-28">

<header class="sticky top-0 z-40 bg-warm/90 backdrop-blur border-b border-black/[.04]">
  <div class="max-w-md mx-auto px-2 h-14 flex items-center justify-between">
    <button class="p-2 rounded-full hover:bg-black/5"><span class="material-symbols-outlined">arrow_back</span></button>
    <p class="text-[15px] font-bold">새 게시글</p>
    <button class="p-2 rounded-full hover:bg-black/5"><span class="material-symbols-outlined">help</span></button>
  </div>
</header>

<main class="max-w-md mx-auto px-4 pt-5">
  <p class="text-[22px] font-bold leading-snug">어떤 게시글을 올릴까요?</p>
  <p class="text-[13.5px] text-on-surface-variant mt-1">유형에 따라 필요한 정보가 조금씩 달라요.</p>

  <!-- Recent draft -->
  <div class="mt-4 rounded-xl bg-tertiary-fixed/50 border border-tertiary-fixed-dim/60 px-3 py-2.5 flex items-center gap-2">
    <span class="material-symbols-outlined text-tertiary" style="font-size:18px">draft</span>
    <p class="text-[12.5px] text-on-tertiary-container flex-1">작성 중이던 글이 있어요 · <b>‘토마토 한 봉지 나눔’</b></p>
    <button class="text-[12px] font-bold text-tertiary">이어쓰기</button>
  </div>

  <!-- Options -->
  <div class="mt-5 flex flex-col gap-3">

    <button class="opt bg-white rounded-2xl p-4 flex items-center gap-3.5 ring-1 ring-black/[.05] hover:ring-primary/40 hover:shadow-md text-left">
      <div class="w-12 h-12 rounded-xl bg-primary-fixed flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-on-primary-fixed-variant" style="font-variation-settings:'FILL' 1;">volunteer_activism</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <p class="text-[15px] font-semibold">나눔</p>
          <span class="text-[10px] font-bold bg-primary-fixed/70 text-on-primary-fixed-variant px-1.5 py-0.5 rounded">무료</span>
        </div>
        <p class="text-[12.5px] text-on-surface-variant mt-0.5 leading-snug">남는 식재료를 이웃에게 무료로 나누어 주세요.</p>
        <div class="flex items-center gap-1 mt-1.5 text-[11px] text-on-surface-variant/80">
          <span class="material-symbols-outlined" style="font-size:13px">timer</span>
          <span>평균 작성 1분</span>
        </div>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
    </button>

    <button class="opt bg-white rounded-2xl p-4 flex items-center gap-3.5 ring-1 ring-black/[.05] hover:ring-secondary/40 hover:shadow-md text-left">
      <div class="w-12 h-12 rounded-xl bg-secondary-fixed flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-on-secondary-fixed-variant" style="font-variation-settings:'FILL' 1;">group</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <p class="text-[15px] font-semibold">공동구매</p>
          <span class="text-[10px] font-bold bg-secondary-fixed-dim/70 text-on-secondary-fixed-variant px-1.5 py-0.5 rounded">인기</span>
        </div>
        <p class="text-[12.5px] text-on-surface-variant mt-0.5 leading-snug">이웃과 함께 대량 구매로 비용과 낭비를 줄여요.</p>
        <div class="flex items-center gap-1 mt-1.5 text-[11px] text-on-surface-variant/80">
          <span class="material-symbols-outlined" style="font-size:13px">trending_up</span>
          <span>이번 주 신규 23건</span>
        </div>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
    </button>

    <button class="opt bg-white rounded-2xl p-4 flex items-center gap-3.5 ring-1 ring-black/[.05] hover:ring-tertiary/40 hover:shadow-md text-left">
      <div class="w-12 h-12 rounded-xl bg-tertiary-fixed flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings:'FILL' 1;">swap_horiz</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-[15px] font-semibold">교환</p>
        <p class="text-[12.5px] text-on-surface-variant mt-0.5 leading-snug">필요한 식재료와 가진 것을 서로 바꿔요.</p>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
    </button>

    <button class="opt bg-white rounded-2xl p-4 flex items-center gap-3.5 ring-1 ring-black/[.05] hover:ring-primary/40 hover:shadow-md text-left">
      <div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings:'FILL' 1;">kitchen</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <p class="text-[15px] font-semibold">내 냉장고에서 바로</p>
          <span class="text-[10px] font-bold bg-primary/10 text-primary px-1.5 py-0.5 rounded">⚡ 빠르게</span>
        </div>
        <p class="text-[12.5px] text-on-surface-variant mt-0.5 leading-snug">등록된 재료를 골라 한 번에 게시해요. 사진·정보 자동 채움.</p>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
    </button>
  </div>

  <!-- Tip -->
  <div class="mt-6 rounded-2xl bg-white ring-1 ring-black/[.05] p-4">
    <p class="text-[12px] font-bold text-tertiary tracking-wide flex items-center gap-1">
      <span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1;">tips_and_updates</span> 도움말
    </p>
    <p class="text-[13px] mt-1 leading-relaxed text-on-surface">
      신뢰 온도가 <b class="text-primary">38°</b> 이상이면 매칭 우선순위가 올라가요. 약속 시간을 잘 지킬수록 온도가 천천히 올라갑니다.
    </p>
  </div>
</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 left-0 w-full bg-white border-t border-black/[.06] z-50 flex justify-around items-center pt-2 pb-5 px-2">
  <a class="flex flex-col items-center text-on-surface-variant" href="Home.html"><span class="material-symbols-outlined" style="font-size:24px">home</span><span class="text-[10px] mt-0.5">홈</span></a>
  <a class="flex flex-col items-center text-on-surface-variant" href="Map.html"><span class="material-symbols-outlined" style="font-size:24px">map</span><span class="text-[10px] mt-0.5">지도</span></a>
  <a class="flex flex-col items-center text-primary" href="Register.html"><span class="material-symbols-outlined" style="font-size:24px;font-variation-settings:'FILL' 1;">add_circle</span><span class="text-[10px] font-bold mt-0.5">등록</span></a>
  <a class="flex flex-col items-center text-on-surface-variant" href="My_Activity.html"><span class="material-symbols-outlined" style="font-size:24px">interests</span><span class="text-[10px] mt-0.5">내 활동</span></a>
  <a class="flex flex-col items-center text-on-surface-variant" href="My_Page.html"><span class="material-symbols-outlined" style="font-size:24px">person</span><span class="text-[10px] mt-0.5">마이</span></a>
</nav>

</body>
</html>
