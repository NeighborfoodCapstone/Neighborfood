<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeighborFood — 페이지 둘러보기</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#faf9f5; --ink:#191c1d; --muted:#3f4a3c; --line:rgba(0,0,0,.08);
    --primary:#006e1c; --primary-soft:#e3efd8;
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans','Noto Sans KR',system-ui,sans-serif;
    min-height: 100dvh;
  }
  header {
    padding: 28px 24px 8px;
    max-width: 1180px; margin: 0 auto;
  }
  header .eyebrow {
    color: var(--primary); font-weight: 700; letter-spacing: .12em; font-size: 11px; text-transform: uppercase;
  }
  header h1 { font-size: 28px; margin: 6px 0 4px; letter-spacing: -.02em; }
  header p { color: var(--muted); font-size: 14px; margin: 0; }

  /* Toolbar */
  .toolbar {
    position: sticky; top: 0; z-index: 20; background: rgba(250,249,245,.9);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--line);
    margin-top: 16px;
  }
  .toolbar-inner {
    max-width: 1180px; margin: 0 auto; padding: 10px 24px;
    display:flex; gap: 12px; align-items:center; flex-wrap:wrap;
  }
  .nav-btn {
    border: 1px solid var(--line); background:#fff; padding: 7px 12px;
    border-radius: 9999px; font-size: 12.5px; font-weight: 600; cursor: pointer;
    display:inline-flex; gap: 6px; align-items:center;
    color: var(--ink);
  }
  .nav-btn[disabled] { opacity:.4; cursor:not-allowed; }
  .nav-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary);}
  .pos { font-size: 12px; color: var(--muted); margin-left: auto; }
  .pos b { color: var(--ink); }

  /* Stage */
  .stage {
    max-width: 1180px; margin: 18px auto 40px; padding: 0 24px;
    display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start;
  }
  @media (max-width: 880px) { .stage { grid-template-columns: 1fr; } }

  /* Sidebar */
  aside {
    background:#fff; border:1px solid var(--line); border-radius: 16px; padding: 8px;
    position: sticky; top: 64px;
  }
  aside ol { list-style: none; padding: 0; margin: 0; counter-reset: step; }
  aside li button {
    width:100%; text-align:left; background: transparent; border: 0; cursor: pointer;
    padding: 10px 12px; border-radius: 10px; display:flex; gap: 12px; align-items:center;
    font: inherit; color: var(--ink);
  }
  aside li button:hover { background: #f3f1ea; }
  aside li button .num {
    width: 22px; height: 22px; border-radius: 50%; background: #ececeb; color: var(--muted);
    display:inline-flex; align-items:center; justify-content:center; font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  aside li button .meta { display:flex; flex-direction:column; line-height: 1.3; }
  aside li button .meta small { color: var(--muted); font-size: 11px; }
  aside li.active button { background: var(--primary-soft); }
  aside li.active button .num { background: var(--primary); color: #fff; }

  /* Frame area */
  .frame-wrap {
    background: #ececeb; border-radius: 22px; padding: 18px;
    border: 1px solid var(--line);
  }
  .frame-meta {
    display:flex; align-items:center; justify-content:space-between; gap: 12px;
    padding: 0 4px 12px;
  }
  .frame-meta h2 { margin: 0; font-size: 16px; letter-spacing: -.01em; }
  .frame-meta a {
    font-size: 12px; color: var(--primary); font-weight: 700; text-decoration: none;
    display: inline-flex; gap: 4px; align-items: center;
  }
  .device {
    background: #fff; border-radius: 28px; overflow: hidden;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,.18), 0 6px 16px rgba(0,0,0,.05);
    margin: 0 auto; width: min(420px, 100%); height: 820px;
    border: 8px solid #1f1f1f;
  }
  .device iframe { width: 100%; height: 100%; border: 0; display:block; background:#fff; }

  kbd {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #fff; border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 6px; padding: 1px 6px; font-size: 11px; color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">NeighborFood · 페이지 둘러보기</p>
  <h1>9개 화면을 순서대로 확인하기</h1>
  <p>왼쪽 사이드바에서 골라보거나, 위 화살표 / 키보드 <kbd>←</kbd> <kbd>→</kbd> 로 넘겨보세요.</p>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <button class="nav-btn" id="prev"><span class="material-symbols-outlined" style="font-size:16px">arrow_back</span> 이전</button>
    <button class="nav-btn primary" id="next">다음 <span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span></button>
    <a class="nav-btn" id="open-tab" target="_blank" href="#"><span class="material-symbols-outlined" style="font-size:16px">open_in_new</span> 새 탭에서 열기</a>
    <span class="pos"><b id="cur">1</b> / <span id="total">9</span> · <span id="curname">홈</span></span>
  </div>
</div>

<div class="stage">
  <aside>
    <ol id="list"></ol>
  </aside>
  <div>
    <div class="frame-wrap">
      <div class="frame-meta">
        <h2 id="title">홈</h2>
        <a id="open-link" target="_blank" href="#">파일 열기 →</a>
      </div>
      <div class="device"><iframe id="frame" src="" title="preview"></iframe></div>
    </div>
  </div>
</div>

<script>
  const PAGES = [
    { name: '홈',          file: 'Home.html',                  desc: '메인 피드' },
    { name: '지도 탐색',   file: 'Map.html',                   desc: '주변 둘러보기' },
    { name: '게시글 등록', file: 'Register.html',              desc: '나눔/공동구매/교환' },
    { name: '내 활동',     file: 'My_Activity.html',           desc: '채팅 + 내 글 + 거래 내역' },
    { name: '채팅 목록',   file: 'Chat_List.html',             desc: '진행 중 대화' },
    { name: '채팅 상세',   file: 'Chat_Detail.html',           desc: '1:1 메시지' },
    { name: '마이',        file: 'My_Page.html',               desc: '프로필 + 메뉴' },
    { name: '프로필 수정', file: 'Edit_Profile.html',          desc: '닉네임 · 카테고리' },
    { name: '동네 설정',   file: 'Neighborhood_Setting.html',  desc: '위치 인증' },
    { name: '관심 목록',   file: 'Wishlist.html',              desc: '저장한 글' },
    { name: '거래 내역',   file: 'Transaction_History.html',   desc: '완료 · 진행 중' },
  ];

  const list = document.getElementById('list');
  const frame = document.getElementById('frame');
  const titleEl = document.getElementById('title');
  const curEl = document.getElementById('cur');
  const curName = document.getElementById('curname');
  const totalEl = document.getElementById('total');
  const openLink = document.getElementById('open-link');
  const openTab = document.getElementById('open-tab');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');

  totalEl.textContent = PAGES.length;
  let idx = Number(new URLSearchParams(location.search).get('i')) || 0;
  if (idx < 0 || idx >= PAGES.length) idx = 0;

  PAGES.forEach((p, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <button data-i="${i}">
        <span class="num">${i+1}</span>
        <span class="meta">
          <span>${p.name}</span>
          <small>${p.desc}</small>
        </span>
      </button>`;
    list.appendChild(li);
  });

  function go(i) {
    idx = (i + PAGES.length) % PAGES.length;
    const p = PAGES[idx];
    frame.src = encodeURI(p.file);
    titleEl.textContent = p.name;
    curEl.textContent = idx + 1;
    curName.textContent = p.name;
    openLink.href = encodeURI(p.file);
    openTab.href = encodeURI(p.file);
    [...list.children].forEach((li, n) => li.classList.toggle('active', n === idx));
    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === PAGES.length - 1;
    history.replaceState(null, '', '?i=' + idx);
  }

  list.addEventListener('click', (e) => {
    const b = e.target.closest('button[data-i]');
    if (b) go(Number(b.dataset.i));
  });
  prevBtn.addEventListener('click', () => go(idx - 1));
  nextBtn.addEventListener('click', () => go(idx + 1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(idx - 1);
    if (e.key === 'ArrowRight') go(idx + 1);
  });

  go(idx);
</script>
</body>
</html>
