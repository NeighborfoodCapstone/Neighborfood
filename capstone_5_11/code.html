<!-- =====================================================================
     JavaScript — </body> 직전 배치 (DOM 로드 완료 보장)
     ===================================================================== -->
<script>
(function () {
  const API = 'http://127.0.0.1:8000';

  // ── 요소 참조 ───────────────────────────────────────────────────────────
  const phoneInput   = document.getElementById('phone-input');
  const requestBtn   = document.getElementById('btn-request-auth');
  const verifyBtn    = document.getElementById('btn-verify');
  const resendBtn    = document.getElementById('btn-resend');
  const timerDisplay = document.getElementById('timer-display');
  const phoneHint    = document.getElementById('phone-hint');
  const codeInputs   = [...document.querySelectorAll('.code-input')]; // 배열로 변환

  // ── 타이머 (중복 실행 방지) ──────────────────────────────────────────────
  let timerInterval = null;

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval); // 기존 타이머 먼저 정리
    let time = 180;
    timerDisplay.classList.remove('timer-expired');
    timerDisplay.textContent = '03:00';

    timerInterval = setInterval(() => {
      time--;
      const m = Math.floor(time / 60);
      const s = time % 60;
      timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
      if (time <= 0) {
        clearInterval(timerInterval);
        timerDisplay.textContent = '만료';
        timerDisplay.classList.add('timer-expired');
      }
    }, 1000);
  }

  // ── 전화번호 형식 자동 하이픈 삽입 (010-XXXX-XXXX) ─────────────────────
  phoneInput.addEventListener('input', () => {
    let v = phoneInput.value.replace(/\D/g, '');
    if (v.length > 11) v = v.slice(0, 11);
    if (v.length > 7)      v = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);
    else if (v.length > 3) v = v.slice(0,3) + '-' + v.slice(3);
    phoneInput.value = v;
    phoneHint.classList.toggle('hidden', /^010-\d{4}-\d{4}$/.test(v) || v === '');
  });

  // ── 인증요청 ────────────────────────────────────────────────────────────
  requestBtn.addEventListener('click', async () => {
    const phone = phoneInput.value.trim();

    if (!phone) {
      alert('전화번호를 입력해 주세요.');
      phoneInput.focus();
      return;
    }
    if (!/^010-\d{4}-\d{4}$/.test(phone)) {
      phoneHint.classList.remove('hidden');
      phoneInput.focus();
      return;
    }

    requestBtn.disabled = true;
    requestBtn.textContent = '발송 중…';

    try {
      const res  = await fetch(`${API}/request-auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone_number: phone })
      });
      const data = await res.json();

      if (res.ok) {
        alert(data.message + '\n(터미널 로그에서 인증번호를 확인하세요.)');
        startTimer();
        clearCodeInputs();
        codeInputs[0].focus(); // 첫 번째 칸으로 포커스 이동
      } else {
        alert('오류: ' + (data.detail || '알 수 없는 오류'));
      }
    } catch (err) {
      alert('서버에 연결할 수 없습니다.\nFastAPI 서버(포트 8000)가 실행 중인지 확인해 주세요.');
    } finally {
      requestBtn.disabled = false;
      requestBtn.textContent = '인증요청';
    }
  });

  // ── 재전송 (인증요청과 동일 로직) ─────────────────────────────────────
  resendBtn.addEventListener('click', () => requestBtn.click());

  // ══════════════════════════════════════════════════════════════════════
  //  6칸 자동 포커스 핵심 로직
  // ══════════════════════════════════════════════════════════════════════
  codeInputs.forEach((input, idx) => {

    // 1) 숫자 입력 → 다음 칸으로 이동
    input.addEventListener('input', (e) => {
      // 숫자 이외 문자 제거, 마지막 1글자만 유지
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val ? val.slice(-1) : '';

      // filled 스타일 토글
      e.target.classList.toggle('filled', !!e.target.value);

      if (e.target.value && idx < codeInputs.length - 1) {
        codeInputs[idx + 1].focus(); // 다음 칸으로 이동
      }

      syncVerifyButton();
    });

    // 2) Backspace — 현재 칸 비어 있으면 이전 칸으로 이동 + 삭제
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        if (!e.target.value && idx > 0) {
          codeInputs[idx - 1].value = '';
          codeInputs[idx - 1].classList.remove('filled');
          codeInputs[idx - 1].focus();
        }
      }
      // 좌우 방향키로도 이동 가능
      if (e.key === 'ArrowLeft'  && idx > 0)                    codeInputs[idx - 1].focus();
      if (e.key === 'ArrowRight' && idx < codeInputs.length - 1) codeInputs[idx + 1].focus();
    });

    // 3) 붙여넣기 — SMS OTP 자동완성 포함
    //    예) "123456" 붙여넣으면 각 칸에 자동 분배
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const raw    = (e.clipboardData || window.clipboardData).getData('text');
      const digits = raw.replace(/\D/g, '').slice(0, 6);

      digits.split('').forEach((d, i) => {
        if (codeInputs[i]) {
          codeInputs[i].value = d;
          codeInputs[i].classList.add('filled');
        }
      });

      // 마지막으로 채운 칸 또는 마지막 칸으로 포커스
      const focusIdx = Math.min(digits.length, codeInputs.length - 1);
      codeInputs[focusIdx].focus();
      syncVerifyButton();
    });

    // 4) 칸 클릭 시 기존 값 전체 선택 (덮어쓰기 편의)
    input.addEventListener('focus', (e) => e.target.select());
  });

  // 6칸 모두 채워야 인증하기 활성화
  function syncVerifyButton() {
    const allFilled = codeInputs.every(i => i.value !== '');
    verifyBtn.disabled = !allFilled;
  }

  function clearCodeInputs() {
    codeInputs.forEach(i => {
      i.value = '';
      i.classList.remove('filled');
    });
    syncVerifyButton();
  }

  // ── 인증하기 ────────────────────────────────────────────────────────────
  verifyBtn.addEventListener('click', async () => {
    const code  = codeInputs.map(i => i.value).join('');
    const phone = phoneInput.value.trim();

    if (code.length < 6) {
      alert('6자리 인증번호를 모두 입력해 주세요.');
      return;
    }

    verifyBtn.disabled = true;
    verifyBtn.querySelector('span:first-child').textContent = '확인 중…';

    try {
      const res  = await fetch(`${API}/verify-auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone_number: phone, code })
      });
      const data = await res.json();

      if (res.ok) {
        clearInterval(timerInterval);
        alert('✅ 인증이 완료되었습니다!\n홈으로 이동합니다.');
        location.href = 'Home.html';
      } else {
        alert('❌ ' + (data.detail || '인증 실패'));
        clearCodeInputs();
        codeInputs[0].focus();
      }
    } catch (err) {
      alert('서버에 연결할 수 없습니다.\nFastAPI 서버(포트 8000)가 실행 중인지 확인해 주세요.');
    } finally {
      verifyBtn.disabled = false;
      verifyBtn.querySelector('span:first-child').textContent = '인증하기';
      syncVerifyButton();
    }
  });

})(); // IIFE — 전역 변수 오염 방지
</script>
