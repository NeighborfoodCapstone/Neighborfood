<!DOCTYPE html>
<html lang="ko">
<head>
<title>회원가입 - NeighborFood</title>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="shared/tokens.css" rel="stylesheet"/>
<script src="shared/auth.js"></script>
<script src="shared/guard.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: {
    primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77',
    'on-primary-fixed-variant':'#005313','on-primary-fixed':'#002204',
    secondary:'#8b5000','secondary-fixed':'#ffdcbe',
    'surface-container-low':'#f3f4f5','surface-container':'#edeeef',
    'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',
    outline:'#6f7a6b','outline-variant':'#becab9',
    error:'#ba1a1a','error-container':'#ffdad6','on-error-container':'#93000a',
    warm:'#faf9f5'
  }, fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] } }}}
</script>
<style>
  body { background:#faf9f5; min-height:100dvh; }
  .field { width:100%; background:#fff; border:1px solid #becab9; border-radius:14px;
           padding:13px 14px; font-size:14.5px; }
  .field:focus { outline:2px solid #006e1c; outline-offset:-1px; border-color:transparent; }
  .label { display:block; font-size:12.5px; font-weight:700; color:#3f4a3c; margin:0 0 6px 2px; }
  .hint  { font-size:11.5px; color:#6f7a6b; margin:5px 2px 0; }
</style>
</head>
<body class="text-on-surface antialiased max-w-md mx-auto px-6 pt-6 pb-10">

  <a href="Login.html" class="w-9 h-9 -ml-2 rounded-full hover:bg-black/5 flex items-center justify-center">
    <span class="material-symbols-outlined">arrow_back</span></a>

  <h1 class="mt-6 text-[24px] font-extrabold tracking-tight">회원가입</h1>
  <p class="mt-1.5 text-[14px] text-on-surface-variant">아이디·비밀번호·휴대폰 번호만 있으면 끝이에요.</p>

  <div class="mt-7 space-y-5">
    <div>
      <label class="label" for="loginId">아이디</label>
      <input id="loginId" class="field" type="text" placeholder="영문·숫자 4~20자" autocomplete="username" autocapitalize="none"/>
    </div>
    <div>
      <label class="label" for="password">비밀번호</label>
      <input id="password" class="field" type="password" placeholder="8자 이상" autocomplete="new-password"/>
    </div>
    <div>
      <label class="label" for="password2">비밀번호 확인</label>
      <input id="password2" class="field" type="password" placeholder="한 번 더 입력" autocomplete="new-password"/>
    </div>
    <div>
      <label class="label" for="phone">휴대폰 번호</label>
      <input id="phone" class="field" type="tel" placeholder="010-0000-0000" autocomplete="tel"/>
      <p class="hint">인증 절차는 없어요. 비밀번호를 잊었을 때 본인 확인 용도로만 사용됩니다.</p>
    </div>
    <div>
      <label class="label" for="nickname">닉네임 <span class="font-medium text-outline">(선택)</span></label>
      <input id="nickname" class="field" type="text" placeholder="이웃에게 보여줄 이름" maxlength="30"/>
    </div>
  </div>

  <p id="err" class="hidden mt-4 text-[13px] font-semibold text-error bg-error-container/60 rounded-xl px-3.5 py-2.5"></p>

  <button id="btn" onclick="doSignup()" class="mt-6 w-full bg-primary text-white text-[15px] font-bold py-3.5 rounded-2xl active:scale-[.99] transition disabled:opacity-50">가입하고 시작하기</button>

  <p class="mt-4 text-center text-[13px] text-on-surface-variant">이미 계정이 있나요?
    <a href="Login.html" class="font-bold text-primary">로그인</a></p>

<script>

  var API = location.origin.startsWith('http') ? location.origin : window.location.origin;
  function saveToken(t){ if (typeof window.nfSetToken==='function') window.nfSetToken(t);
                         else { try{ localStorage.setItem('nf_token', t); }catch(e){} } }
  function showErr(msg){ var el=document.getElementById('err'); el.textContent=msg; el.classList.remove('hidden'); }
  function hideErr(){ document.getElementById('err').classList.add('hidden'); }
  function nextPage(){ var p=new URLSearchParams(location.search).get('next');
                       return (p && !p.startsWith('http')) ? p : 'Home.html'; }

  function normPhone(v) {
    var d = v.replace(/[^0-9]/g, '');
    if (d.length === 11) return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
    if (d.length === 10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
    return v.trim();
  }

  async function doSignup() {
    hideErr();
    var id   = document.getElementById('loginId').value.trim();
    var pw   = document.getElementById('password').value;
    var pw2  = document.getElementById('password2').value;
    var ph   = normPhone(document.getElementById('phone').value);
    var nick = document.getElementById('nickname').value.trim();

    if (!/^[a-zA-Z0-9_]{4,20}$/.test(id)) return showErr('아이디는 영문·숫자 4~20자로 입력해 주세요.');
    if (pw.length < 8)                       return showErr('비밀번호는 8자 이상이어야 해요.');
    if (pw !== pw2)                          return showErr('비밀번호가 서로 달라요. 다시 확인해 주세요.');
    if (ph.replace(/[^0-9]/g,'').length < 10) return showErr('휴대폰 번호를 정확히 입력해 주세요.');

    var body = { login_id:id, password:pw, phone_number:ph };
    if (nick) body.nickname = nick;

    var btn = document.getElementById('btn'); btn.disabled = true;
    try {
      var res  = await fetch(API + '/api/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      var data = await res.json();
      if (!res.ok) return showErr(data.detail || '가입에 실패했습니다.');
      saveToken(data.token);            // 가입 즉시 로그인
      location.replace(nextPage());
    } catch (e) { showErr('서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.'); }
    finally { btn.disabled = false; }
  }
</script>
</body>
</html>
