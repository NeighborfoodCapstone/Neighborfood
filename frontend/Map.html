<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>지도 - NeighborFood</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=cdb0bdb09959d56a5d81d5f8947d9fc2&libraries=clusterer"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#006e1c', 'primary-fixed': '#94f990', 'primary-fixed-dim': '#78dc77',
            'on-primary': '#fff', 'on-primary-fixed-variant': '#005313',
            'primary-container': '#4caf50', 'on-primary-container': '#003c0b',
            secondary: '#8b5000', 'secondary-container': '#ff9800', 'secondary-fixed-dim': '#ffb870',
            'on-secondary-container': '#653900',
            tertiary: '#466270', 'tertiary-fixed-dim': '#adcbda', 'on-tertiary-container': '#183642',
            'surface-container-lowest': '#fff', 'surface-container': '#edeeef', 'surface-container-high': '#e7e8e9',
            'on-surface': '#191c1d', 'on-surface-variant': '#3f4a3c',
            outline: '#6f7a6b', 'outline-variant': '#becab9',
          }, fontFamily: { sans: ['"Plus Jakarta Sans"', '"Noto Sans KR"', 'system-ui'] }
        }
      }
    }
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
      overflow: hidden;
    }

    /* 카카오맵이 들어갈 컨테이너. 가짜 지도 배경/도로/라벨은 모두 제거함. */
    #map {
      width: 100%;
      height: 100%;
      background: #eef1ea;
    }

    /* 핀 애니메이션 (CustomOverlay 안에서도 동작) */
    @keyframes pin-in {
      from {
        opacity: 0;
        transform: scale(.8) translateY(4px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .pin-anim {
      animation: pin-in .3s ease-out both;
    }

    /* 내 위치 점 */
    @keyframes ping {
      0% {
        transform: scale(.8);
        opacity: .6;
      }

      80%,
      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    .me-ping {
      animation: ping 1.8s ease-out infinite;
    }

    /* 바텀시트 트랜지션 */
    .sheet {
      transition: transform .35s ease;
    }

    /* 카카오 클러스터러 기본 마커 숨김(우리 스타일로 덮어씀) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* SDK 로드 실패 / 키 미설정 안내 */
    #map-error {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #eef1ea;
      padding: 24px;
      text-align: center;
      color: #3f4a3c;
      font-size: 14px;
      line-height: 1.5;
      z-index: 1;
    }

    #map-error.show {
      display: flex;
    }
  </style>
</head>

<body class="text-on-surface antialiased relative h-screen">

  <div id="map" class="absolute inset-0"></div>

  <div id="map-error">
    <div>
      <p class="font-bold mb-1">지도를 불러올 수 없습니다</p>
      <p class="text-[12px] opacity-80">
        Kakao JavaScript 키를 설정했는지,<br />
        developers.kakao.com에서 도메인이 등록됐는지 확인하세요.
      </p>
    </div>
  </div>

  <div class="absolute top-0 left-0 right-0 z-30 pt-3 px-3 pb-2 bg-gradient-to-b from-white/85 to-transparent">
    <div
      class="max-w-md mx-auto bg-white rounded-2xl shadow-[0_6px_20px_rgba(0,0,0,.08)] flex items-center px-3 py-2.5">
      <button class="p-1 -ml-1"><span
          class="material-symbols-outlined text-on-surface-variant">arrow_back</span></button>
      <input id="search-input"
        class="flex-1 bg-transparent border-0 focus:ring-0 text-[14.5px] px-2 placeholder:text-outline"
        placeholder="이 지역에서 검색" />
    </div>
    <div class="max-w-md mx-auto flex gap-2 overflow-x-auto no-scrollbar mt-2.5 pb-1" id="filter-bar">
      <button data-filter="all"
        class="filter-btn shrink-0 bg-primary text-white text-[12px] font-semibold px-3 py-1.5 rounded-full shadow">전체</button>
      <button data-filter="share"
        class="filter-btn shrink-0 bg-white text-on-surface text-[12px] font-medium px-3 py-1.5 rounded-full ring-1 ring-black/5">🌱
        무료나눔</button>
      <button data-filter="groupbuy"
        class="filter-btn shrink-0 bg-white text-on-surface text-[12px] font-medium px-3 py-1.5 rounded-full ring-1 ring-black/5">👥
        공동구매</button>
      <button data-filter="exchange"
        class="filter-btn shrink-0 bg-white text-on-surface text-[12px] font-medium px-3 py-1.5 rounded-full ring-1 ring-black/5">🔄
        교환</button>
      <button data-filter="urgent"
        class="filter-btn shrink-0 bg-white text-on-surface text-[12px] font-medium px-3 py-1.5 rounded-full ring-1 ring-black/5">⏳
        임박</button>
    </div>
  </div>

  <div class="absolute right-3 bottom-[280px] z-30 flex flex-col gap-2">
    <button id="btn-mylocation"
      class="w-11 h-11 rounded-full bg-white shadow ring-1 ring-black/5 flex items-center justify-center"><span
        class="material-symbols-outlined text-primary">my_location</span></button>
    <button id="btn-zoom-in"
      class="w-11 h-11 rounded-full bg-white shadow ring-1 ring-black/5 flex items-center justify-center"><span
        class="material-symbols-outlined text-on-surface-variant">add</span></button>
    <button id="btn-zoom-out"
      class="w-11 h-11 rounded-full bg-white shadow ring-1 ring-black/5 flex items-center justify-center"><span
        class="material-symbols-outlined text-on-surface-variant">remove</span></button>
  </div>

  <button id="research-btn"
    class="hidden absolute left-1/2 -translate-x-1/2 bottom-[260px] z-30 bg-white text-on-surface text-[12.5px] font-semibold px-4 py-2 rounded-full shadow-[0_6px_18px_rgba(0,0,0,.1)] flex items-center gap-1.5 ring-1 ring-black/5">
    <span class="material-symbols-outlined text-primary" style="font-size:16px">refresh</span>
    이 지역 다시 검색
  </button>

  <div class="absolute bottom-[72px] left-0 right-0 z-30 sheet">
    <div class="bg-white rounded-t-3xl shadow-[0_-8px_30px_rgba(0,0,0,.08)] pt-2">
      <div class="w-10 h-1 bg-on-surface-variant/30 rounded-full mx-auto"></div>
      <div class="px-4 pt-2 pb-3 flex items-center justify-between">
        <p class="text-[14px] font-bold">이 지역 결과 <span class="text-primary" id="result-count">0</span>건</p>
      </div>

      <div id="result-list" class="px-3 pb-3 max-h-[200px] overflow-y-auto"></div>
    </div>
  </div>

  <nav
    class="fixed bottom-0 left-0 w-full bg-white border-t border-black/[.06] z-50 flex justify-around items-center pt-2 pb-5 px-2">
    <a class="flex flex-col items-center text-on-surface-variant" href="Home.html"><span
        class="material-symbols-outlined" style="font-size:24px">home</span><span
        class="text-[10px] mt-0.5">홈</span></a>
    <a class="flex flex-col items-center text-primary" href="Map.html"><span class="material-symbols-outlined"
        style="font-size:24px;font-variation-settings:'FILL' 1;">map</span><span
        class="text-[10px] font-bold mt-0.5">지도</span></a>
    <a class="flex flex-col items-center text-on-surface-variant" href="Register.html"><span
        class="material-symbols-outlined" style="font-size:24px">add_circle</span><span
        class="text-[10px] mt-0.5">등록</span></a>
    <a class="flex flex-col items-center text-on-surface-variant" href="My_Activity.html"><span
        class="material-symbols-outlined" style="font-size:24px">interests</span><span class="text-[10px] mt-0.5">내
        활동</span></a>
    <a class="flex flex-col items-center text-on-surface-variant" href="My_Page.html"><span
        class="material-symbols-outlined" style="font-size:24px">person</span><span
        class="text-[10px] mt-0.5">마이</span></a>
  </nav>

  <script>
    /* ========== 설정 ========== */
    const API_BASE = 'http://127.0.0.1:8000'; // 게시판/상세와 동일한 백엔드
    const DEFAULT_CENTER = { lat: 37.5452, lng: 127.0865 }; // 구의동(구의1동 주민센터)
    const DEFAULT_LEVEL = 3;
    const URGENT_THRESHOLD_HOURS = 24; // expiresAt이 24h 이내면 "임박"

    const PIN_STYLE = {
      share: { bg: '#006e1c', icon: 'eco', label: '나눔' },
      groupbuy: { bg: '#ff9800', icon: 'group', label: '공동구매' },
      exchange: { bg: '#466270', icon: 'swap_horiz', label: '교환' },
    };

    /* ========== 상태 ========== */
    let map, clusterer;
    let allPosts = [];          // 원본 데이터
    let currentFilter = 'all';  // 카테고리 필터
    let overlays = [];          // CustomOverlay (가까운 줌)
    let markers = [];          // Marker (먼 줌, 클러스터링용)
    let selectedId = null;
    let myLocationOverlay = null;

    /* ========== SDK 로드 가드 ========== */
    if (typeof kakao === 'undefined' || !kakao.maps) {
      document.getElementById('map-error').classList.add('show');
    } else {
      initMap();
    }

    /* ========== 지도 초기화 ========== */
    function initMap() {
      map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng),
        level: DEFAULT_LEVEL,
      });

      clusterer = new kakao.maps.MarkerClusterer({
        map, averageCenter: true, minLevel: 5, // 5레벨 이상 줌아웃에서 클러스터링
        disableClickZoom: false,
        styles: [{
          width: '48px', height: '48px',
          background: '#ecfccb', color: '#365314',
          borderRadius: '50%', textAlign: 'center', lineHeight: '48px',
          fontWeight: 'bold', border: '2px solid #365314',
          boxShadow: '0 4px 12px rgba(0,0,0,.2)'
        }],
      });

      // 이벤트 바인딩
      kakao.maps.event.addListener(map, 'dragend', showResearchBtn);
      kakao.maps.event.addListener(map, 'zoom_changed', () => {
        showResearchBtn();
        rerenderForZoom(); // 줌에 따라 마커/오버레이 토글
      });
      kakao.maps.event.addListener(map, 'idle', updateBottomSheet);

      kakao.maps.event.addListener(map, 'click', () => {
        if (selectedId !== null) {
          selectedId = null;  // 선택 상태 초기화
          render();           // 핀 스타일 원래대로 재렌더링
        }
        if (window.__collapseSheet) window.__collapseSheet();
      });

      bindUI();
      loadPosts();
      initMyLocation();
    }

    /* ========== 데이터 로드 ========== */
    async function loadPosts() {
      try {
        const res = await fetch(`${API_BASE}/posts?limit=200`);
        if (!res.ok) throw new Error('API ' + res.status);
        const data = await res.json();
        allPosts = (data.items || []).map(normalizePost);
      } catch (e) {
        console.warn('백엔드 로드 실패 → posts.json 폴백:', e.message);
        try {
          const r2 = await fetch('./posts.json');
          const d2 = await r2.json();
          allPosts = (Array.isArray(d2) ? d2 : [d2]).map(normalizePost);
        } catch (e2) {
          console.error('데이터 로드 실패:', e2);
          allPosts = [];
        }
      }
      render();
    }

    function normalizePost(p) {
      const gb = p.groupBuy
        || ((p.gb_target != null || p.gb_current != null)
            ? { current: p.gb_current ?? 0, target: p.gb_target ?? 0 }
            : null);
      return {
        ...p,
        createdAt: p.createdAt ?? p.created_at,
        expiresAt: p.expiresAt ?? p.expires_at,
        groupBuy: gb,
      };
    }

    function detailUrl(post) {
      const page = post.type === 'groupbuy' ? 'Group_Buy_Detail.html' : 'Product_Detail.html';
      return `${page}?id=${encodeURIComponent(post.id)}`;
    }

    /* ========== 렌더링 ========== */
    function render() {
      overlays.forEach(o => o.setMap(null));
      markers.forEach(m => m.setMap(null));
      clusterer.clear();
      overlays = [];
      markers = [];

      const filtered = applyFilter(allPosts, currentFilter);

      filtered.forEach(post => {
        overlays.push(createOverlay(post));
        markers.push(createMarker(post));
      });

      rerenderForZoom();
      updateBottomSheet();
    }

    function rerenderForZoom() {
      if (!map) return;
      const level = map.getLevel();
      if (level >= 5) {
        overlays.forEach(o => o.setMap(null));
        clusterer.addMarkers(markers);
      } else {
        clusterer.clear();
        overlays.forEach(o => o.setMap(map));
      }
    }

    /* ========== CustomOverlay (말풍선 핀) ========== */
    function createOverlay(post) {
      const isSelected = post.id === selectedId;
      const s = PIN_STYLE[post.type] || PIN_STYLE.share;

      const wrap = document.createElement('div');
      wrap.className = 'pin-anim';
      wrap.style.cursor = 'pointer';

      const bubbleStyle = isSelected
        ? 'background:#365314;color:#fff;border:2px solid #365314;'
        : 'background:#ecfccb;color:#365314;border:2px solid #365314;';
      const stickColor = '#365314';

      let titleText = post.title;
      if (post.type === 'groupbuy' && post.groupBuy) {
        titleText = `${post.title} ${post.groupBuy.current}/${post.groupBuy.target}`;
      }

      wrap.innerHTML = `
        <div class="px-3 py-1.5 rounded-full text-[12.5px] font-bold flex items-center gap-1 whitespace-nowrap shadow"
            style="${bubbleStyle}${isSelected ? 'transform:scale(1.1);' : ''}">
          <span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1;color:${isSelected ? '#fff' : s.bg}">${s.icon}</span>
          <span>${escapeHtml(titleText)}</span>
        </div>
        <div class="w-1 h-4 mx-auto rounded-b-sm shadow-sm" style="background:${stickColor}"></div>
      `;
      
      // 마커 내부 다른 마커 클릭 시 즉시 활성화 상태 전환을 보장
      wrap.addEventListener('click', (e) => {
        e.stopPropagation();
        selectPost(post.id);
      });

      return new kakao.maps.CustomOverlay({
        position: new kakao.maps.LatLng(post.lat, post.lng),
        content: wrap,
        yAnchor: 1,
        zIndex: isSelected ? 10 : 1,
      });
    }

    /* ========== Marker (클러스터링용) ========== */
    function createMarker(post) {
      const marker = new kakao.maps.Marker({
        position: new kakao.maps.LatLng(post.lat, post.lng),
        title: post.title,
      });
      kakao.maps.event.addListener(marker, 'click', () => {
        selectPost(post.id);
      });
      return marker;
    }

    /* ========== 선택 / 활성화 ========== */
    function selectPost(id) {
      selectedId = id;
      render(); // 활성화 마커 스타일 및 바텀시트 하이라이트 즉시 갱신
      
      const p = allPosts.find(x => x.id === id);
      if (p) {
        map.panTo(new kakao.maps.LatLng(p.lat, p.lng));
        
        // 만약 지도 줌이 멀리 설정되어 있다면 마커가 보이도록 줌인 처리
        if (map.getLevel() >= 5) {
          map.setLevel(DEFAULT_LEVEL, { animate: true });
        }
        
        // 선택된 아이템이 바텀시트 안에서 보이도록 스크롤 포커스 이동
        setTimeout(() => {
          const activeCard = document.querySelector(`.result-card[data-id="${id}"]`);
          if (activeCard) {
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        }, 100);
      }
    }

    /* ========== 필터 ========== */
    function applyFilter(posts, filter) {
      if (filter === 'all') return posts;
      if (filter === 'urgent') {
        const now = Date.now();
        return posts.filter(p => {
          if (!p.expiresAt) return false;
          const diffH = (new Date(p.expiresAt).getTime() - now) / 36e5;
          return diffH > 0 && diffH <= URGENT_THRESHOLD_HOURS;
        });
      }
      return posts.filter(p => p.type === filter);
    }

    /* ========== 바텀시트 리스트 구조 및 이벤트 ========== */
    function updateBottomSheet() {
      if (!map) return;
      const bounds = map.getBounds();
      const filtered = applyFilter(allPosts, currentFilter)
        .filter(p => bounds.contain(new kakao.maps.LatLng(p.lat, p.lng)));

      document.getElementById('result-count').textContent = filtered.length;

      const list = document.getElementById('result-list');
      if (filtered.length === 0) {
        list.innerHTML = `<p class="text-center text-[12px] text-on-surface-variant py-6">이 지역에 결과가 없어요</p>`;
        return;
      }

      // 1. 카드 전체 영역에 cursor-pointer 부여하되 하이퍼링크 대신 마커 활성화(selectPost) 기능 지정
      list.innerHTML = filtered.map(p => {
        const s = PIN_STYLE[p.type] || PIN_STYLE.share;
        const ago = timeAgo(p.createdAt);
        const isSelected = p.id === selectedId;
        return `
      <div class="result-card flex items-center gap-3 py-2 border-t border-black/[.05] cursor-pointer ${isSelected ? 'bg-[#f1f8ed] -mx-3 px-3 rounded-xl' : ''}"
           data-id="${p.id}" onclick="selectPost(${p.id})">
        <div class="w-10 h-10 rounded-lg shrink-0 flex items-center justify-center" style="background:${s.bg}22">
          <span class="material-symbols-outlined" style="font-size:20px;color:${s.bg};font-variation-settings:'FILL' 1;">${s.icon}</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[13px] font-semibold truncate">
            <a href="${detailUrl(p)}"
              onclick="event.stopPropagation()"
              class="hover:underline active:opacity-70">${escapeHtml(p.title)}</a>
          </p>
          <p class="text-[11px] text-on-surface-variant truncate">${escapeHtml(p.address || '')} · ${ago}</p>
        </div>
        <span class="text-[10.5px] font-bold px-2 py-0.5 rounded-full" style="color:${s.bg};background:${s.bg}22">${s.label}</span>
      </div>
    `;
      }).join('');
    }

    /* ========== UI 바인딩 ========== */
    function bindUI() {
      document.getElementById('filter-bar').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => {
          const active = b.dataset.filter === currentFilter;
          b.className = `filter-btn shrink-0 text-[12px] px-3 py-1.5 rounded-full ${active
              ? 'bg-primary text-white font-semibold shadow'
              : 'bg-white text-on-surface font-medium ring-1 ring-black/5'
            }`;
        });
        render();
      });

      document.getElementById('btn-zoom-in').addEventListener('click', () => {
        map.setLevel(map.getLevel() - 1, { animate: true });
      });
      document.getElementById('btn-zoom-out').addEventListener('click', () => {
        map.setLevel(map.getLevel() + 1, { animate: true });
      });

      document.getElementById('btn-mylocation').addEventListener('click', initMyLocation);

      document.getElementById('research-btn').addEventListener('click', () => {
        document.getElementById('research-btn').classList.add('hidden');
        updateBottomSheet();
      });

      document.getElementById('search-input').addEventListener('input', e => {
        const q = e.target.value.trim().toLowerCase();
        const list = document.getElementById('result-list');
        list.querySelectorAll('.result-card').forEach(el => {
          const text = el.textContent.toLowerCase();
          el.style.display = !q || text.includes(q) ? '' : 'none';
        });
      });
    }

    /* ========== Geolocation ========== */
    function initMyLocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        pos => {
          const ll = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
          map.setCenter(ll);
          drawMyLocation(ll);
        },
        err => {
          console.warn('Geolocation 거부/실패:', err.message);
        },
        { enableHighAccuracy: true, timeout: 5000 }
      );
    }

    function drawMyLocation(latlng) {
      if (myLocationOverlay) myLocationOverlay.setMap(null);
      const dot = document.createElement('div');
      dot.className = 'relative';
      dot.innerHTML = `
    <span class="absolute inset-0 -m-2 rounded-full bg-primary/30 me-ping"></span>
    <span class="block w-4 h-4 rounded-full bg-primary border-[3px] border-white shadow"></span>
  `;
      myLocationOverlay = new kakao.maps.CustomOverlay({
        position: latlng, content: dot, yAnchor: 0.5, xAnchor: 0.5, zIndex: 100
      });
      myLocationOverlay.setMap(map);
    }

    /* ========== 유틸 ========== */
    function showResearchBtn() {
      document.getElementById('research-btn').classList.remove('hidden');
    }

    function timeAgo(iso) {
      if (!iso) return '';
      const diffM = (Date.now() - new Date(iso).getTime()) / 60000;
      if (diffM < 1) return '방금';
      if (diffM < 60) return `${Math.floor(diffM)}분 전`;
      const diffH = diffM / 60;
      if (diffH < 24) return `${Math.floor(diffH)}시간 전`;
      return `${Math.floor(diffH / 24)}일 전`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    /* ========== 바텀시트 드래그 및 높이 제어 ========== */
    (function () {
      const NAV_H = document.querySelector('nav').offsetHeight || 72;
      const MIN_MAP_VISIBLE = 240;

      function getVH() {
        return (window.visualViewport && window.visualViewport.height) || window.innerHeight;
      }

      let PEEK_H, THIRD_H, TWO_3_H, SNAPS;
      function calcSnaps() {
        const vh    = getVH();
        const MIN_H = 120;
        const maxH  = Math.max(MIN_H, vh - MIN_MAP_VISIBLE);

        PEEK_H  = Math.min(150 + NAV_H, maxH);
        THIRD_H = Math.min(Math.round(vh * (1/3)) + NAV_H, maxH);
        TWO_3_H = Math.min(Math.round(vh * (2/3)) + NAV_H, maxH);

        THIRD_H = Math.max(THIRD_H, PEEK_H);
        TWO_3_H = Math.max(TWO_3_H, THIRD_H);

        SNAPS = [PEEK_H, THIRD_H, TWO_3_H];
      }
      calcSnaps();

      const sheet = document.querySelector('.sheet');
      const inner = sheet.querySelector('.bg-white');
      const handle = sheet.querySelector('.rounded-full.mx-auto');
      const list = document.getElementById('result-list');

       sheet.classList.remove('absolute');
       Object.assign(sheet.style, {
         position:   'fixed',
         bottom:     '0',
         left:       '0',
         right:      '0',
         height:     PEEK_H + 'px',
         overflow:   'hidden',
         transition: 'height .32s cubic-bezier(.4,0,.2,1)',
         zIndex:     '30',
       });

      Object.assign(inner.style, {
        height: '100%',
        display: 'flex',
        flexDirection: 'column',
        boxSizing: 'border-box',
        paddingBottom: NAV_H + 'px',
      });
      list.style.flex = '1';
      list.style.minHeight = '0';
      list.style.maxHeight = 'none';

      function syncListHeight() {}

      let startY = 0;
      let startH = 0;
      let dragging = false;

      function maxSheetHeight() {
        const fixedArea = inner.offsetHeight - list.offsetHeight;
        const naturalH  = fixedArea + list.scrollHeight;
        return Math.min(TWO_3_H, naturalH);
      }

      function onStart(e) {
        dragging = true;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        startH = parseInt(sheet.style.height) || PEEK_H;
        sheet.style.transition = 'none';
        e.preventDefault();
      }

      function onMove(e) {
        if (!dragging) return;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const delta = startY - y;
        const newH = Math.max(PEEK_H, Math.min(maxSheetHeight(), startH + delta));
        sheet.style.height = newH + 'px';
        syncListHeight();
        e.preventDefault();
      }

      function onEnd() {
        if (!dragging) return;
        dragging = false;
        sheet.style.transition = 'height .32s cubic-bezier(.4,0,.2,1)';

        const maxH = maxSheetHeight();
        const cappedSnaps = SNAPS.map(s => Math.min(s, maxH));
        const curH = parseInt(sheet.style.height);
        const snap = cappedSnaps.reduce((a, b) =>
          Math.abs(b - curH) < Math.abs(a - curH) ? b : a
        );
        sheet.style.height = snap + 'px';
        syncListHeight();
      }

      handle.style.cursor = 'grab';
      handle.addEventListener('mousedown', onStart, { passive: false });
      handle.addEventListener('touchstart', onStart, { passive: false });

      document.addEventListener('mousemove', onMove, { passive: false });
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);

      sheet.querySelector('.px-4').addEventListener('click', () => {
        sheet.style.transition = 'height .32s cubic-bezier(.4,0,.2,1)';
        const curH = parseInt(sheet.style.height);
        let next;

        const maxH = maxSheetHeight();
        if      (curH < PEEK_H + 30)  next = Math.min(THIRD_H, maxH);
        else if (curH < THIRD_H + 30) next = Math.min(TWO_3_H, maxH);
        else                           next = PEEK_H;

        sheet.style.height = next + 'px';
        syncListHeight();
      });

      (window.visualViewport || window).addEventListener('resize', () => {
        calcSnaps();
        const curH    = parseInt(sheet.style.height) || PEEK_H;
        const clamped = Math.max(PEEK_H, Math.min(TWO_3_H, curH));
        sheet.style.height = clamped + 'px';
        syncListHeight();
      });

      window.__collapseSheet = function () {
        const curH = parseInt(sheet.style.height);
        if (curH > PEEK_H + 30) {  
          sheet.style.transition = 'height .32s cubic-bezier(.4,0,.2,1)';
          sheet.style.height = PEEK_H + 'px';
        }
      };

    })();
  </script>
</body>
