<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>프로필 수정 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="shared/tokens.css" rel="stylesheet"/>
<script src="shared/auth.js"></script>
<script src="shared/guard.js"></script>
<script>nfRequireMember();</script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: {
    primary:'#006e1c','primary-fixed':'#94f990','on-primary-fixed-variant':'#005313',
    secondary:'#8b5000','on-surface':'#191c1d','on-surface-variant':'#3f4a3c',
    outline:'#6f7a6b','outline-variant':'#becab9', error:'#ba1a1a'
  }, fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] } }}}
</script>
<style>
  body { background:#faf9f5; min-height:max(884px,100dvh); font-family:'Plus Jakarta Sans','Noto Sans KR',system-ui; }
  .ring-soft { box-shadow: 0 0 0 1px rgba(0,0,0,.05); }
  input, textarea { font-family: inherit; }
  input:focus, textarea:focus { outline:none; border-color:#006e1c; box-shadow:0 0 0 3px rgba(0,110,28,.12); }
  .chip { padding:6px 12px; border-radius:9999px; font-size:12px; font-weight:600; border:1px solid #becab9; background:#fff; color:#3f4a3c; cursor:pointer;}
  .chip.on { background:#94f990; border-color:#94f990; color:#005313;}
</style>
</head>
<body class="text-on-surface antialiased pb-24">

<header class="sticky top-0 z-40 bg-white/85 backdrop-blur border-b border-black/[.05]">
  <div class="max-w-2xl mx-auto px-2 h-14 flex items-center">
    <button onclick="history.back()" class="p-2 rounded-full hover:bg-black/5"><span class="material-symbols-outlined">arrow_back</span></button>
    <p class="text-[16px] font-bold">프로필 수정</p>
    <button id="saveBtn" class="ml-auto px-3.5 py-1.5 rounded-full bg-primary text-white text-[13px] font-bold mr-2">저장</button>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 pt-5">

  <!-- Avatar -->
  <section class="flex flex-col items-center">
    <div class="relative">
      <div class="w-24 h-24 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed-variant text-[34px] font-bold ring-4 ring-white shadow-sm">건</div>
      <button class="absolute bottom-0 right-0 w-8 h-8 bg-white rounded-full ring-1 ring-black/10 shadow flex items-center justify-center">
        <span class="material-symbols-outlined" style="font-size:18px">photo_camera</span>
      </button>
    </div>
    <button class="mt-2 text-[12px] text-on-surface-variant underline-offset-2 hover:underline">기본 이미지로 변경</button>
  </section>

  <!-- Form -->
  <section class="mt-6 bg-white rounded-2xl ring-soft divide-y divide-black/[.05]">
    <div class="p-4">
      <label class="text-[12px] font-semibold text-on-surface-variant flex items-center justify-between">
        <span>닉네임</span>
        <span class="text-[10.5px] text-outline">5/20</span>
      </label>
      <input id="fNickname" class="w-full mt-2 px-3.5 py-3 rounded-lg border border-outline-variant bg-white text-[14.5px]" type="text" value=""/>
      <p class="text-[11px] text-on-surface-variant/80 mt-1.5">닉네임은 30일에 1회 변경할 수 있어요.</p>
    </div>

    <div class="p-4">
      <label class="text-[12px] font-semibold text-on-surface-variant">자기소개</label>
      <textarea id="fBio" class="w-full mt-2 px-3.5 py-3 rounded-lg border border-outline-variant bg-white text-[14px] resize-none" rows="3" placeholder="이웃에게 한마디 남겨보세요"></textarea>
    </div>

    <div class="p-4">
      <label class="text-[12px] font-semibold text-on-surface-variant">관심 카테고리</label>
      <div id="interestChips" class="flex flex-wrap gap-2 mt-2.5">
        <button class="chip">채소</button>
        <button class="chip">과일</button>
        <button class="chip">육류</button>
        <button class="chip">베이커리</button>
        <button class="chip">유제품</button>
        <button class="chip">반찬</button>
        <button class="chip">간편식</button>
        <button class="chip">기본 식재료</button>
      </div>
    </div>

    <div class="p-4">
      <label class="text-[12px] font-semibold text-on-surface-variant">식이 정보 <span class="text-outline font-normal">(선택)</span></label>
      <div id="dietChips" class="flex flex-wrap gap-2 mt-2.5">
        <button class="chip">비건</button>
        <button class="chip">베지테리언</button>
        <button class="chip">글루텐 프리</button>
        <button class="chip">알러지 있음</button>
      </div>
    </div>
  </section>

  <!-- Linked info -->
  <section class="mt-3 bg-white rounded-2xl ring-soft overflow-hidden divide-y divide-black/[.05]">
    <div class="px-4 py-3.5">
      <p class="text-[14px]">연결된 이메일</p>
      <input id="fEmail" type="email" placeholder="이메일을 입력하세요"
             class="w-full mt-1.5 px-3 py-2.5 rounded-lg border border-outline-variant bg-white text-[13.5px]"/>
    </div>
    <div class="flex items-center justify-between px-4 py-3.5 opacity-90">
      <div>
        <p class="text-[14px]">휴대폰 번호</p>
        <p id="phoneState" class="text-[11.5px] text-primary font-semibold mt-0.5">인증 완료 ✓</p>
      </div>
      <span class="material-symbols-outlined text-primary" style="font-size:20px;font-variation-settings:'FILL' 1;">verified</span>
    </div>
    <a class="flex items-center justify-between px-4 py-3.5">
      <div>
        <p class="text-[14px]">알림 설정</p>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant" style="font-size:18px">chevron_right</span>
    </a>
  </section>

  <a href="Withdraw.html" class="block w-full mt-4 py-3 text-error text-[13px] font-semibold text-center">계정 탈퇴</a>

  <div class="h-6"></div>
</main>

<nav class="fixed bottom-0 left-0 w-full bg-white border-t border-black/[.06] z-50 flex justify-around items-center pt-2 pb-5 px-2">
  <a class="flex flex-col items-center text-on-surface-variant" href="Home.html"><span class="material-symbols-outlined" style="font-size:24px">home</span><span class="text-[10px] mt-0.5">홈</span></a>
  <a class="flex flex-col items-center text-on-surface-variant" href="Map.html"><span class="material-symbols-outlined" style="font-size:24px">map</span><span class="text-[10px] mt-0.5">지도</span></a>
  <a class="flex flex-col items-center text-on-surface-variant" href="Create_Post.html"><span class="material-symbols-outlined" style="font-size:24px">add_circle</span><span class="text-[10px] mt-0.5">등록</span></a>
  <a class="flex flex-col items-center text-on-surface-variant" href="My_Activity.html"><span class="material-symbols-outlined" style="font-size:24px">interests</span><span class="text-[10px] mt-0.5">내 활동</span></a>
  <a class="flex flex-col items-center text-primary" href="My_Page.html"><span class="material-symbols-outlined" style="font-size:24px;font-variation-settings:'FILL' 1;">person</span><span class="text-[10px] font-bold mt-0.5">마이</span></a>
</nav>

<script>
  const API_BASE = window.location.origin;

  function chipText(btn){ return btn.textContent.trim(); }
  function selectedChips(containerId){
    return Array.from(document.querySelectorAll('#'+containerId+' .chip.on')).map(chipText);
  }
  function applyChips(containerId, values){
    const set = new Set(values || []);
    document.querySelectorAll('#'+containerId+' .chip').forEach(b=>{
      b.classList.toggle('on', set.has(chipText(b)));
    });
  }
  // 칩 토글
  document.querySelectorAll('#interestChips .chip, #dietChips .chip').forEach(b=>{
    b.addEventListener('click', ()=> b.classList.toggle('on'));
  });

  // 프로필 로드 → 폼 채우기
  (async function loadProfile(){
    try{
      const res = await fetch(API_BASE + '/api/users/me');
      if (window.nfHandleAuthError && nfHandleAuthError(res)) return;
      if (!res.ok) return;
      const u = await res.json();
      if (u.nickname) document.getElementById('fNickname').value = u.nickname;
      if (u.bio)      document.getElementById('fBio').value = u.bio;
      if (u.email)    document.getElementById('fEmail').value = u.email;
      applyChips('interestChips', u.interests);
      applyChips('dietChips', u.dietary);
      // 아바타 이니셜
      const ini = (u.nickname || u.loginId || '?').trim().charAt(0);
      const av = document.querySelector('section.flex.flex-col.items-center .rounded-full.bg-primary-fixed');
      if (av) av.textContent = ini;
      // 휴대폰: 가입 시 입력받았으므로 항상 '인증 완료' 표기 유지
      if (u.phoneMasked) document.getElementById('phoneState').textContent = u.phoneMasked + ' · 인증 완료 ✓';
    }catch(e){}
  })();

  // 저장
  document.getElementById('saveBtn').addEventListener('click', async ()=>{
    const body = {
      nickname:  document.getElementById('fNickname').value.trim(),
      bio:       document.getElementById('fBio').value.trim(),
      email:     document.getElementById('fEmail').value.trim(),
      interests: selectedChips('interestChips'),
      dietary:   selectedChips('dietChips'),
    };
    const btn = document.getElementById('saveBtn'); btn.disabled = true;
    try{
      const res = await fetch(API_BASE + '/api/users/me', {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if (window.nfHandleAuthError && nfHandleAuthError(res)) return;
      const data = await res.json();
      if (!res.ok){ alert(data.detail || '저장에 실패했어요.'); return; }
      alert('프로필이 저장되었어요.');
      location.href = 'My_Page.html';
    }catch(e){ alert('서버에 연결할 수 없어요.'); }
    finally{ btn.disabled = false; }
  });
</script>
</body>
</html>
