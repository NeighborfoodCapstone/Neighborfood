<script>
  // 시연용: 로그인 미구현이라 author_id를 하드코딩
  const CURRENT_USER_ID = 'user_demo_01';
  // 백엔드 주소 - 같은 호스트면 빈 문자열로 두면 되고, 다른 포트면 절대 주소
  const API_BASE = window.location.origin;

  // 현재 선택된 거래 유형 ('share' | 'exchange' | 'groupbuy')
  let currentType = 'share';
  // 업로드 완료된 이미지 파일명 (서버가 돌려준 uuid 파일명)
  let uploadedImages = [];

  // ── 현재 선택된 거래 위치(지도에서 사용자가 정한 좌표) ──
  let selectedLat = 37.5452;  // 구의1동 기본
  let selectedLng = 127.0865;

  // ── Kakao 지도 초기화 (인터랙티브) ──
  let locationMap = null;
  let geocoder = null;
  (function initLocationMap() {
    if (typeof kakao === 'undefined' || !kakao.maps) {
      console.warn('Kakao SDK 미로드 — 지도 기능 비활성화');
      return;
    }
    const container = document.getElementById('locationMap');
    const center = new kakao.maps.LatLng(selectedLat, selectedLng);
    locationMap = new kakao.maps.Map(container, { center, level: 3 });

    // 좌표 → 주소 변환기 (services 라이브러리)
    if (kakao.maps.services) {
      geocoder = new kakao.maps.services.Geocoder();
    }

    // 지도 이동 끝나면 중앙 좌표를 선택 좌표로 갱신 + 주소 갱신
    kakao.maps.event.addListener(locationMap, 'idle', () => {
      const c = locationMap.getCenter();
      selectedLat = c.getLat();
      selectedLng = c.getLng();
      reverseGeocode(selectedLat, selectedLng);
    });

    // 초기 주소도 한 번 갱신
    reverseGeocode(selectedLat, selectedLng);
  })();

  // 좌표 → 주소 변환
  function reverseGeocode(lat, lng) {
    if (!geocoder) return;
    geocoder.coord2Address(lng, lat, (result, status) => {
      if (status !== kakao.maps.services.Status.OK) return;
      const r = result[0];
      // 도로명 주소 우선, 없으면 지번 주소
      const addr =
        (r.road_address && r.road_address.address_name) ||
        (r.address && r.address.address_name) || '';
      if (addr) document.getElementById('addressInput').textContent = addr;
    });
  }

  // 내 위치 버튼
  document.getElementById('myLocationBtn').addEventListener('click', () => {
    if (!navigator.geolocation || !locationMap) {
      alert('위치 정보를 사용할 수 없어요.');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const ll = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
        locationMap.setCenter(ll);
      },
      err => alert('현재 위치를 가져오지 못했어요: ' + err.message),
      { enableHighAccuracy: true, timeout: 5000 }
    );
  });

  // ── 상단 타이틀 및 거래 유형 토글 ──
  const pageTitle = document.getElementById('pageTitle');
  const typeSeg = document.getElementById('typeSeg');
  const exchangeSection = document.getElementById('exchangeSection');
  const groupbuySection = document.getElementById('groupbuySection');
  const submitBtn = document.getElementById('submitBtn');

  typeSeg.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      typeSeg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      currentType = btn.dataset.type;
      
      exchangeSection.classList.toggle('hidden', currentType !== 'exchange');
      groupbuySection.classList.toggle('hidden', currentType !== 'groupbuy');
      
      // 거래 유형에 따른 텍스트 변경
      if (currentType === 'share') {
        pageTitle.textContent = '나눔 글쓰기';
        submitBtn.textContent = '나눔 게시하기';
      } else if (currentType === 'exchange') {
        pageTitle.textContent = '교환 글쓰기';
        submitBtn.textContent = '교환 게시하기';
      } else if (currentType === 'groupbuy') {
        pageTitle.textContent = '공동구매 글쓰기';
        submitBtn.textContent = '공동구매 모집하기';
      }
    });
  });

  // ── 유통기한 슬라이더 연동 로직 ──
  const expiryRange = document.getElementById('expiryRange');
  const expiryTrack = document.getElementById('expiryTrack');
  const expiryThumb = document.getElementById('expiryThumb');
  const expiryText = document.getElementById('expiryText');

  expiryRange.addEventListener('input', (e) => {
    const val = parseInt(e.target.value, 10);
    const max = parseInt(e.target.max, 10);
    
    // 퍼센트 계산
    const percent = (val / max) * 100;
    
    // 시각적 트랙 길이 및 썸 위치 업데이트
    expiryTrack.style.width = `${percent}%`;
    expiryThumb.style.left = `calc(${percent}% - 10px)`;
    
    // 상단 라벨 텍스트 변경
    if (val === 0) {
      expiryText.textContent = '오늘까지';
    } else if (val === max) {
      expiryText.textContent = '30일 이상 남음';
    } else {
      expiryText.textContent = `${val}일 남음`;
    }
  });

  // ── 설명 글자수 카운터 ──
  const descInput = document.getElementById('descInput');
  const descCount = document.getElementById('descCount');
  descInput.addEventListener('input', () => {
    descCount.textContent = descInput.value.length;
  });

  // ── 사진 업로드 ──
  const photoInput = document.getElementById('photoInput');
  const photoStrip = document.getElementById('photoStrip');
  const photoCount = document.getElementById('photoCount');

  photoInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    if (uploadedImages.length + files.length > 10) {
      alert('사진은 최대 10장까지 올릴 수 있어요.');
      return;
    }

    // FormData에 파일들 담아서 한 번에 업로드
    const fd = new FormData();
    files.forEach(f => fd.append('files', f));

    try {
      const res = await fetch(`${API_BASE}/upload-images`, { method:'POST', body:fd });
      if (!res.ok) throw new Error((await res.json()).detail || '업로드 실패');
      const data = await res.json();
      // 서버가 돌려준 파일명을 누적 저장
      uploadedImages = uploadedImages.concat(data.files);
      renderPhotos();
    } catch (err) {
      alert('이미지 업로드 실패: ' + err.message);
    } finally {
      // 같은 파일 다시 선택할 수 있게 초기화
      photoInput.value = '';
    }
  });

  function renderPhotos() {
    // 기존 미리보기 모두 제거 (첫 번째 <label> 입력기는 유지)
    photoStrip.querySelectorAll('.preview-thumb').forEach(n => n.remove());

    uploadedImages.forEach((name, idx) => {
      const div = document.createElement('div');
      div.className = 'preview-thumb shrink-0 w-20 h-20 rounded-xl relative ring-1 ring-black/5 overflow-hidden bg-cover bg-center';
      div.style.backgroundImage = `url("${API_BASE}/uploads/${name}")`;
      if (idx === 0) {
        const badge = document.createElement('span');
        badge.className = 'absolute top-1 left-1 text-[9px] font-bold bg-primary text-white px-1 py-0.5 rounded';
        badge.textContent = '대표';
        div.appendChild(badge);
      }
      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'absolute -top-1.5 -right-1.5 w-5 h-5 bg-on-surface text-white rounded-full flex items-center justify-center';
      remove.innerHTML = '<span class="material-symbols-outlined" style="font-size:13px">close</span>';
      remove.addEventListener('click', () => {
        uploadedImages.splice(idx, 1);
        renderPhotos();
      });
      div.appendChild(remove);
      photoStrip.appendChild(div);
    });

    photoCount.textContent = `${uploadedImages.length}/10`;
  }

  // ── 게시 버튼: 폼 → POST /posts ──
  submitBtn.addEventListener('click', async () => {
    const title = document.getElementById('titleInput').value.trim();
    const description = descInput.value.trim();
    const category = document.getElementById('categoryInput').value;
    const address = document.getElementById('addressInput').textContent.trim();
    
    // 체크박스 옵션 데이터 (게시할 때 포함되도록 수정 가능)
    const isPickupToday = document.getElementById('pickupToday').checked;
    const isUntactTrade = document.getElementById('untactTrade').checked;
    const expiryDays = document.getElementById('expiryRange').value;

    // 기본 검증
    if (!title)       return alert('제목을 입력해 주세요.');
    if (!description) return alert('설명을 입력해 주세요.');

    const payload = {
      type: currentType,
      title, description, category,
      images: uploadedImages,
      address,
      // 사용자가 지도에서 직접 정한 좌표 사용 (기본값: 구의1동)
      lat: selectedLat, lng: selectedLng,
      author_id: CURRENT_USER_ID,
      options: { 
        pickup_today: isPickupToday, 
        untact_trade: isUntactTrade,
        expiry_days: parseInt(expiryDays, 10)
      }
    };

    if (currentType === 'exchange') {
      const want = document.getElementById('exchangeWantInput').value.trim();
      if (!want) return alert('교환을 원하는 품목을 적어 주세요.');
      payload.exchange_want = want;
    }
    if (currentType === 'groupbuy') {
      const target = parseInt(document.getElementById('gbTargetInput').value, 10);
      const price  = parseInt(document.getElementById('gbPriceInput').value, 10);
      if (!target || target < 2) return alert('목표 인원을 2명 이상으로 입력해 주세요.');
      if (isNaN(price) || price < 0) return alert('1인당 가격을 입력해 주세요.');
      payload.gb_target = target;
      payload.gb_price  = price;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '게시 중…';

    try {
      const res = await fetch(`${API_BASE}/posts`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error((await res.json()).detail || '게시 실패');
      const data = await res.json();
      alert('게시글이 등록되었습니다! (#' + data.id + ')');
      // 등록된 글의 상세 페이지로 이동
      const detailPage = currentType === 'groupbuy' ? 'Group_Buy_Detail.html' : 'Product_Detail.html';
      location.href = `${detailPage}?id=${data.id}`;
    } catch (err) {
      alert('게시 실패: ' + err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = currentType === 'groupbuy' ? '공동구매 모집하기'
                            : currentType === 'exchange' ? '교환 게시하기' : '나눔 게시하기';
    }
  });
</script>
