<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR 거래 인증 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="./vendor/qrcode.min.js"></script>
<script src="./vendor/html5-qrcode.min.js"></script>
<script src="shared/auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<script>
 tailwind.config = { theme: { extend: {
  colors: {
   primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77',
   'on-primary':'#fff','on-primary-fixed-variant':'#005313',
   secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed':'#ffdcbe','secondary-fixed-dim':'#ffb870','on-secondary-container':'#653900',
   tertiary:'#466270','tertiary-fixed':'#c9e7f7','tertiary-fixed-dim':'#adcbda','on-tertiary-container':'#183642',
   danger:'#ba1a1a','on-surface':'#191c1d','on-surface-variant':'#3f4a3c',outline:'#6f7a6b','outline-variant':'#becab9',
   'surface-container-low':'#f3f4f5'
  },
  fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] }
 }}}
</script>
<style>
 body { background:#0a0a0a; min-height:100dvh; }
 .camera-bg {
  background:
   radial-gradient(ellipse 60% 70% at 50% 40%, rgba(255,255,255,.045) 0%, transparent 60%),
   linear-gradient(135deg, #1a1f1c, #0f1410 60%, #1a1f1c);
  position:absolute; inset:0;
 }
 .camera-bg::before, .camera-bg::after { content:''; position:absolute; background: rgba(255,255,255,.04); border-radius:8px; }
 .camera-bg::before { left:18%; top:20%; width:18%; height:14%; transform:rotate(-4deg); }
 .camera-bg::after { right:14%; top:55%; width:22%; height:30%; transform:rotate(3deg); }
 @keyframes scan-y { 0%,100% { top:8%; } 50% { top:88%; } }
 .scan-line { animation: scan-y 2.4s ease-in-out infinite; }
 @keyframes ping-soft { 0% { transform: scale(.9); opacity:.7 } 100% { transform: scale(1.4); opacity:0 } }
 .qr-ping::after { content:''; position:absolute; inset:0; border:1px solid rgba(148,249,144,.6); border-radius:inherit; animation: ping-soft 1.8s ease-out infinite; }
 .panel { display:none; }
 .panel.active { display:block; }
 #qr-reader video { border-radius:1.25rem; object-fit:cover; }
 #qr-reader__dashboard_section_csr span,
 #qr-reader__dashboard_section_csr button,
 #qr-reader__dashboard_section_swaplink { font-size:11px !important; color:white !important; }
 #qr-reader__scan_region { min-height:220px; display:grid; place-items:center; }
 .no-scrollbar::-webkit-scrollbar { display:none; }
 .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }
 #bottomSheet { height: var(--sheet-height, 44dvh); transition: height .18s ease; touch-action:none; }
 #bottomSheet.dragging { transition:none; }
 #sheetBody { height: calc(100% - 48px); overflow-y:auto; }
 canvas#issuedQrCanvas { width:260px !important; height:260px !important; image-rendering:auto; }
</style>
</head>
<body class="text-white antialiased overflow-hidden">
<div class="camera-bg"></div>

<header class="relative z-10 px-3 pt-4">
 <div class="max-w-md mx-auto flex items-center justify-between">
  <button onclick="history.back()" class="w-10 h-10 rounded-full bg-black/50 backdrop-blur flex items-center justify-center">
   <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <p class="text-[15px] font-bold text-white">QR 거래 인증</p>
  <button id="helpBtn" class="w-10 h-10 rounded-full bg-black/50 backdrop-blur flex items-center justify-center" title="도움말">
   <span class="material-symbols-outlined">help</span>
  </button>
 </div>
</header>

<div class="relative z-10 text-center mt-5 px-4 max-w-md mx-auto">
 <p class="text-[11.5px] font-bold text-primary-fixed-dim tracking-wide">FastAPI + SQLite QR 인증</p>
 <h2 id="heroTitle" class="text-[18px] font-bold mt-1 drop-shadow">상대방 QR을 스캔해 거래를 확정하세요</h2>
 <p id="heroDesc" class="text-[12px] text-white/70 mt-1.5">카메라 스캔 · QR 발급 · 이력 조회를 API로 처리합니다</p>
</div>

<div class="relative z-10 mt-5 flex justify-center">
 <div class="bg-black/55 backdrop-blur rounded-full p-1 flex gap-1">
  <button data-mode="scan" class="mode-btn px-4 py-1.5 rounded-full bg-white text-on-surface text-[12px] font-bold">QR 스캔</button>
  <button data-mode="issue" class="mode-btn px-4 py-1.5 rounded-full text-white/80 text-[12px] font-semibold">QR 발급</button>
  <button data-mode="history" class="mode-btn px-4 py-1.5 rounded-full text-white/80 text-[12px] font-semibold">이력</button>
 </div>
</div>

<main class="relative z-10 mt-6 flex flex-col items-center">
 <div class="relative w-[290px] h-[290px] rounded-[2rem] border-2 border-primary-fixed/70 bg-black/30 shadow-[0_0_30px_rgba(148,249,144,.25)] overflow-hidden flex items-center justify-center">
  <div id="fakeQrPattern" class="absolute inset-10 grid grid-cols-7 grid-rows-7 gap-1.5 opacity-80">
   <div class="col-span-2 row-span-2 bg-white rounded-sm relative"><div class="absolute inset-1.5 bg-on-surface"></div><div class="absolute inset-2.5 bg-white"></div></div>
   <div class="col-span-3 bg-white/80 rounded-sm"></div><div></div><div class="col-span-2 row-span-2 bg-white rounded-sm relative"><div class="absolute inset-1.5 bg-on-surface"></div><div class="absolute inset-2.5 bg-white"></div></div>
   <div></div><div class="bg-white/70 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div>
   <div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div>
   <div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div>
   <div class="col-span-2 row-span-2 bg-white rounded-sm relative"><div class="absolute inset-1.5 bg-on-surface"></div><div class="absolute inset-2.5 bg-white"></div></div>
   <div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div>
  </div>
  <div id="qr-reader" class="hidden absolute inset-2 overflow-hidden rounded-2xl bg-black/70"></div>
  <div id="issuedQrWrap" class="hidden absolute inset-4 rounded-[1.5rem] bg-white p-3 grid place-items-center shadow-xl">
   <canvas id="issuedQrCanvas" width="260" height="260" class="block rounded-xl bg-white"></canvas>
  </div>
  <div class="absolute inset-3 rounded-2xl ring-2 ring-primary-fixed/60 qr-ping pointer-events-none"></div>
  <div class="absolute top-0 left-0 w-9 h-9 border-t-[3px] border-l-[3px] border-primary-fixed rounded-tl-xl"></div>
  <div class="absolute top-0 right-0 w-9 h-9 border-t-[3px] border-r-[3px] border-primary-fixed rounded-tr-xl"></div>
  <div class="absolute bottom-0 left-0 w-9 h-9 border-b-[3px] border-l-[3px] border-primary-fixed rounded-bl-xl"></div>
  <div class="absolute bottom-0 right-0 w-9 h-9 border-b-[3px] border-r-[3px] border-primary-fixed rounded-br-xl"></div>
  <div id="scanLine" class="absolute left-2 right-2 h-0.5 bg-primary-fixed shadow-[0_0_18px_3px_rgba(148,249,144,.8)] scan-line"></div>
 </div>
 <p id="frameHint" class="mt-5 text-[12px] text-white/80">QR을 사각형 안에 맞춰주세요</p>
 <div id="statusBadge" class="mt-3 flex items-center gap-2 bg-primary/90 backdrop-blur px-3 py-1.5 rounded-full">
  <span class="w-2 h-2 rounded-full bg-white"></span>
  <span id="statusText" class="text-[11px] font-bold">인식 대기 중</span>
 </div>
</main>

<section id="bottomSheet" class="fixed bottom-0 left-0 right-0 bg-white text-on-surface rounded-t-3xl z-20 shadow-[0_-12px_30px_rgba(0,0,0,.4)]">
 <div id="sheetHandle" class="h-12 max-w-md mx-auto px-4 pt-3 cursor-ns-resize select-none">
  <div class="w-10 h-1 bg-on-surface-variant/30 rounded-full mx-auto mb-2"></div>
  <div class="flex justify-center gap-1 text-[10px] text-on-surface-variant">
   <button type="button" data-sheet="24" class="sheet-btn rounded-full border border-outline-variant px-2 py-0.5">작게</button>
   <button type="button" data-sheet="44" class="sheet-btn rounded-full border border-outline-variant px-2 py-0.5">중간</button>
   <button type="button" data-sheet="86" class="sheet-btn rounded-full border border-outline-variant px-2 py-0.5">크게</button>
  </div>
 </div>
 <div id="sheetBody" class="no-scrollbar">
  <div class="max-w-md mx-auto px-4 pb-8">
   <section id="panel-scan" class="panel active">
    <div class="flex items-center gap-3">
     <div class="w-11 h-11 rounded-2xl bg-tertiary-fixed/60 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-tertiary" style="font-variation-settings:'FILL' 1;">verified_user</span>
     </div>
     <div class="flex-1 min-w-0">
      <p class="text-[10.5px] font-bold text-tertiary tracking-wide">검증 준비</p>
      <p class="text-[13.5px] font-semibold truncate">카메라 QR 또는 raw token을 검증합니다</p>
      <p class="text-[10.5px] text-on-surface-variant mt-0.5">FastAPI: POST /api/qr/verify</p>
     </div>
    </div>
    <button id="startCameraBtn" class="mt-4 w-full rounded-2xl bg-primary px-4 py-3 text-[13px] font-extrabold text-white flex items-center justify-center gap-2">
     <span class="material-symbols-outlined text-[18px]">photo_camera</span> 카메라 스캔 시작
    </button>
    <form id="manualForm" class="mt-3 space-y-2">
     <label class="block">
      <span class="text-[11px] font-bold text-on-surface-variant">수동 토큰 / 검증 URL</span>
      <input id="manualToken" class="mt-1 w-full rounded-2xl border border-outline-variant bg-surface-container-low px-3 py-2.5 text-[13px] outline-none focus:border-primary" placeholder="verify URL 또는 raw token" />
     </label>
     <button class="w-full rounded-2xl bg-on-surface px-4 py-3 text-[13px] font-extrabold text-white">검증 처리</button>
    </form>
    <div id="verifyResult" class="mt-3 hidden rounded-2xl border px-4 py-3 text-[12px]"></div>
   </section>

   <section id="panel-issue" class="panel">
    <div class="flex items-center gap-3">
     <div class="w-11 h-11 rounded-2xl bg-primary-fixed/60 flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">add_card</span>
     </div>
     <div class="flex-1 min-w-0">
      <p class="text-[10.5px] font-bold text-primary tracking-wide">QR 발급</p>
      <p class="text-[13.5px] font-semibold truncate">거래용 1회성 인증 QR 생성</p>
      <p class="text-[10.5px] text-on-surface-variant mt-0.5">FastAPI: POST /api/qr/request</p>
     </div>
    </div>
    <form id="issueForm" class="mt-4 grid grid-cols-2 gap-2">
     <label class="col-span-2 block">
      <span class="text-[11px] font-bold text-on-surface-variant">거래/사용자 ID</span>
      <input id="subjectId" class="mt-1 w-full rounded-2xl border border-outline-variant bg-surface-container-low px-3 py-2.5 text-[13px] outline-none focus:border-primary" value="pickup_001" />
     </label>
     <label class="block">
      <span class="text-[11px] font-bold text-on-surface-variant">목적</span>
      <select id="purpose" class="mt-1 w-full rounded-2xl border border-outline-variant bg-surface-container-low px-3 py-2.5 text-[13px] outline-none focus:border-primary">
       <option value="pickup_confirm">픽업 확인</option>
       <option value="groupbuy_receive">공동구매 수령</option>
       <option value="seller_check">판매자 확인</option>
      </select>
     </label>
     <label class="block">
      <span class="text-[11px] font-bold text-on-surface-variant">TTL</span>
      <select id="ttlSeconds" class="mt-1 w-full rounded-2xl border border-outline-variant bg-surface-container-low px-3 py-2.5 text-[13px] outline-none focus:border-primary">
       <option value="60">1분</option>
       <option value="180" selected>3분</option>
       <option value="300">5분</option>
       <option value="900">15분</option>
      </select>
     </label>
     <button class="col-span-2 w-full rounded-2xl bg-primary px-4 py-3 text-[13px] font-extrabold text-white">QR 발급 요청</button>
    </form>
    <div id="issueResult" class="mt-3 hidden rounded-2xl bg-surface-container-low px-4 py-3 text-[12px] text-on-surface-variant"></div>
   </section>

   <section id="panel-history" class="panel">
    <div class="flex items-center justify-between gap-3">
     <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl bg-secondary-fixed/70 flex items-center justify-center shrink-0">
       <span class="material-symbols-outlined text-secondary" style="font-variation-settings:'FILL' 1;">history</span>
      </div>
      <div>
       <p class="text-[10.5px] font-bold text-secondary tracking-wide">최근 인증 이력</p>
       <p class="text-[13.5px] font-semibold">발급/검증 상태 확인</p>
      </div>
     </div>
     <button id="clearHistoryBtn" class="rounded-full border border-outline-variant px-3 py-1.5 text-[11px] font-bold">초기화</button>
    </div>
    <div id="historyList" class="mt-4 space-y-2"></div>
   </section>
  </div>
 </div>
</section>

<script>
const API_BASE = "http://127.0.0.1:8000";
const API_ENDPOINTS = {
 request: `${API_BASE}/api/qr/request`,
 verify: `${API_BASE}/api/qr/verify`,
 history: `${API_BASE}/api/qr/history`
};

let currentMode = "scan";
let qrScanner = null;
let scanLocked = false;
let lastIssuedSession = null;

const heroCopy = {
 scan: ["상대방 QR을 스캔해 거래를 확정하세요", "카메라 스캔 또는 수동 토큰 입력으로 검증합니다", "QR을 사각형 안에 맞춰주세요", "인식 대기 중"],
 issue: ["거래용 인증 QR을 발급하세요", "FastAPI가 토큰을 만들고 SQLite에 hash를 저장합니다", "발급된 QR이 여기에 표시됩니다", "발급 대기 중"],
 history: ["최근 인증 이력을 확인하세요", "ISSUED / VERIFIED / EXPIRED 상태를 조회합니다", "이력 요약 모드입니다", "이력 조회 중"]
};

function $(id) { return document.getElementById(id); }
function formatTime(value) {
 if (!value) return "-";
 try {
  return new Intl.DateTimeFormat("ko-KR", { month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" }).format(new Date(value));
 } catch { return value; }
}
function statusClass(status) {
 if (status === "VERIFIED") return "bg-green-50 border-green-200 text-primary";
 if (status === "EXPIRED") return "bg-rose-50 border-rose-200 text-danger";
 return "bg-amber-50 border-amber-200 text-secondary";
}
function statusLabel(status) {
 return { ISSUED:"발급됨", VERIFIED:"검증 완료", EXPIRED:"만료됨" }[status] || status || "-";
}
function resultLabel(result) {
 return { verified:"검증 완료", already_used:"이미 사용됨", expired:"만료됨", not_found:"찾을 수 없음" }[result] || result || "-";
}
function showStage(kind) {
 $("fakeQrPattern").classList.toggle("hidden", kind !== "fake");
 $("issuedQrWrap").classList.toggle("hidden", kind !== "issued");
 $("qr-reader").classList.toggle("hidden", kind !== "camera");
 $("scanLine").classList.toggle("hidden", kind !== "fake" && kind !== "camera");
}
async function stopScanner() {
 if (qrScanner) {
  try { await qrScanner.stop(); } catch (_) {}
  try { qrScanner.clear(); } catch (_) {}
  qrScanner = null;
 }
 scanLocked = false;
}
async function setMode(mode) {
 currentMode = mode;
 document.querySelectorAll(".mode-btn").forEach((btn) => {
  const active = btn.dataset.mode === mode;
  btn.className = active
   ? "mode-btn px-4 py-1.5 rounded-full bg-white text-on-surface text-[12px] font-bold"
   : "mode-btn px-4 py-1.5 rounded-full text-white/80 text-[12px] font-semibold";
 });
 document.querySelectorAll(".panel").forEach((panel) => panel.classList.remove("active"));
 $(`panel-${mode}`).classList.add("active");
 const copy = heroCopy[mode];
 $("heroTitle").textContent = copy[0];
 $("heroDesc").textContent = copy[1];
 $("frameHint").textContent = copy[2];
 $("statusText").textContent = copy[3];
 if (mode !== "scan") await stopScanner();
 if (mode === "issue" && lastIssuedSession) showStage("issued");
 else showStage("fake");
 if (mode === "history") renderHistory();
}
async function apiJson(url, options = {}) {
 const res = await fetch(url, {
  ...options,
  headers: { "Content-Type": "application/json", ...(options.headers || {}) }
 });
 const data = await res.json().catch(() => ({}));
 if (!res.ok) throw new Error(data.detail || data.message || `HTTP ${res.status}`);
 return data;
}
async function issueSession({ subjectId, purpose, ttlSeconds }) {
 const data = await apiJson(API_ENDPOINTS.request, {
  method:"POST",
  body: JSON.stringify({ subjectId, purpose, ttlSeconds })
 });
 if (!data.ok || !data.session) throw new Error(data.message || "QR 발급 실패");
 return data.session;
}
async function drawIssuedQr(session) {
 const canvas = $("issuedQrCanvas");
 const payload = session.token || session.verifyUrl;
 canvas.width = 260;
 canvas.height = 260;
 const context = canvas.getContext("2d");
 context.clearRect(0, 0, canvas.width, canvas.height);
 if (!window.QRCode || !QRCode.toCanvas) {
  throw new Error("QR 라이브러리 로드 실패: 인터넷 연결 또는 CDN 차단을 확인하세요.");
 }
 await QRCode.toCanvas(canvas, payload, {
  width: 260,
  margin: 2,
  color: { dark: "#005313", light: "#ffffff" },
  errorCorrectionLevel: "M"
 });
 showStage("issued");
}
function showIssueResult(session) {
 const box = $("issueResult");
 box.classList.remove("hidden");
 box.innerHTML = `
  <div class="flex items-start justify-between gap-3">
   <div>
    <p class="font-extrabold text-on-surface">QR 생성 완료</p>
    <p class="mt-1">ID: <b>${session.subjectId}</b> · ${session.purpose}</p>
   </div>
   <span class="rounded-full bg-green-100 px-2.5 py-1 text-[10px] font-extrabold text-primary">${session.status}</span>
  </div>
  <div class="mt-2 grid gap-1">
   <p>만료: ${formatTime(session.expiresAt)}</p>
   <p class="break-all">QR payload/token: ${session.token || "-"}</p>
   <p class="break-all">verify URL: ${session.verifyUrl || "-"}</p>
  </div>`;
}
async function verifyRaw(rawValue) {
 const value = String(rawValue || "").trim();
 if (!value) {
  alert("검증할 토큰 또는 URL을 입력하세요.");
  return;
 }
 $("statusText").textContent = "검증 요청 중...";
 const data = await apiJson(API_ENDPOINTS.verify, {
  method:"POST",
  body: JSON.stringify({ rawValue: value })
 });
 showVerifyResult(data);
 await renderHistory();
}
function showVerifyResult(data) {
 const box = $("verifyResult");
 const session = data.session || {};
 const good = data.ok && data.result === "verified";
 box.className = `mt-3 rounded-2xl border px-4 py-3 text-[12px] ${good ? "bg-green-50 border-green-200 text-primary" : "bg-rose-50 border-rose-200 text-danger"}`;
 box.innerHTML = `
  <p class="font-extrabold">${good ? "거래 인증 완료" : "검증 실패"}</p>
  <p class="mt-1">${data.message || resultLabel(data.result)}</p>
  <div class="mt-2 grid gap-1 text-[11px] opacity-85">
   <p>결과: ${resultLabel(data.result)}</p>
   <p>상태: ${session.status || "-"}</p>
   <p>거래/사용자: ${session.subjectId || "-"}</p>
   <p>검증시각: ${formatTime(session.usedAt || session.lastScannedAt)}</p>
  </div>`;
 $("statusText").textContent = good ? "검증 완료" : resultLabel(data.result);
 setSheetHeight(56);
}
async function renderHistory() {
 const list = $("historyList");
 try {
  const data = await apiJson(`${API_ENDPOINTS.history}?limit=20`);
  const items = data.items || [];
  if (!items.length) {
   list.innerHTML = `<div class="rounded-2xl bg-surface-container-low px-4 py-5 text-center text-[12px] text-on-surface-variant">아직 이력이 없습니다.</div>`;
   return;
  }
  list.innerHTML = items.map((item) => `
   <div class="rounded-2xl border px-4 py-3 text-[12px] ${statusClass(item.status)}">
    <div class="flex items-start justify-between gap-3">
     <div>
      <p class="font-extrabold">${item.subjectId}</p>
      <p class="mt-0.5 text-[11px] text-on-surface-variant">${item.purpose} · 발급 ${formatTime(item.issuedAt)}</p>
     </div>
     <span class="shrink-0 rounded-full bg-white/70 px-2.5 py-1 text-[10px] font-extrabold">${statusLabel(item.status)}</span>
    </div>
    <p class="mt-2 text-[10.5px] text-on-surface-variant">만료 ${formatTime(item.expiresAt)} · 검증 ${formatTime(item.usedAt)}</p>
   </div>`).join("");
 } catch (error) {
  list.innerHTML = `<div class="rounded-2xl bg-rose-50 px-4 py-5 text-center text-[12px] text-danger">이력 조회 실패: ${error.message}</div>`;
 }
}
async function startCameraScanner() {
 await setMode("scan");
 showStage("camera");
 $("statusText").textContent = "카메라 시작 중...";
 if (location.protocol === "file:") {
  $("statusText").textContent = "localhost 실행 필요";
  alert("현재 file://로 열려 있습니다. 카메라와 API 테스트는 http://localhost:5500/QR%20Scan.html 로 열어주세요.");
  showStage("fake");
  return;
 }
 if (!window.Html5Qrcode) {
  $("statusText").textContent = "스캐너 라이브러리 로드 실패";
  showStage("fake");
  return;
 }
 try {
  await stopScanner();
  qrScanner = new Html5Qrcode("qr-reader");
  let cameraConfig = { facingMode: "environment" };
  try {
   const cameras = await Html5Qrcode.getCameras();
   if (cameras && cameras.length) {
    const preferred = cameras.find((cam) => /back|rear|environment|후면/i.test(cam.label)) || cameras[cameras.length - 1];
    cameraConfig = preferred.id;
   }
  } catch (_) {}
  scanLocked = false;
  await qrScanner.start(
   cameraConfig,
   { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1 },
   async (decodedText) => {
    if (scanLocked) return;
    scanLocked = true;
    $("statusText").textContent = "QR 인식됨";
    await stopScanner();
    try { await verifyRaw(decodedText); }
    catch (error) {
     $("statusText").textContent = "검증 실패";
     showVerifyResult({ ok:false, result:"not_found", message:error.message });
    }
   },
   () => undefined
  );
  $("statusText").textContent = "카메라 활성";
 } catch (error) {
  console.warn(error);
  $("statusText").textContent = "카메라 권한 필요";
  showStage("fake");
  alert(`카메라 시작 실패: ${error.message || error}`);
 }
}
function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }
function setSheetHeight(vh) {
 const value = clamp(Number(vh), 20, 88);
 $("bottomSheet").style.setProperty("--sheet-height", `${value}dvh`);
}
function initSheetDrag() {
 const sheet = $("bottomSheet");
 const handle = $("sheetHandle");
 let startY = 0;
 let startHeight = 44;
 let dragging = false;
 handle.addEventListener("pointerdown", (event) => {
  if (event.target.closest("button")) return;
  dragging = true;
  startY = event.clientY;
  const h = sheet.getBoundingClientRect().height;
  startHeight = (h / window.innerHeight) * 100;
  sheet.classList.add("dragging");
  handle.setPointerCapture(event.pointerId);
 });
 handle.addEventListener("pointermove", (event) => {
  if (!dragging) return;
  const delta = ((startY - event.clientY) / window.innerHeight) * 100;
  setSheetHeight(startHeight + delta);
 });
 handle.addEventListener("pointerup", (event) => {
  if (!dragging) return;
  dragging = false;
  sheet.classList.remove("dragging");
  const current = (sheet.getBoundingClientRect().height / window.innerHeight) * 100;
  const snaps = [24, 44, 86];
  const snap = snaps.reduce((a, b) => Math.abs(b-current) < Math.abs(a-current) ? b : a);
  setSheetHeight(snap);
  try { handle.releasePointerCapture(event.pointerId); } catch (_) {}
 });
 document.querySelectorAll(".sheet-btn").forEach((btn) => btn.addEventListener("click", () => setSheetHeight(btn.dataset.sheet)));
}

document.querySelectorAll(".mode-btn").forEach((btn) => btn.addEventListener("click", () => setMode(btn.dataset.mode)));

 const subjectId = $("subjectId").value.trim();
