<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QR 스캔 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77',
      'on-primary':'#fff','on-primary-fixed-variant':'#005313',
      secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed':'#ffdcbe','secondary-fixed-dim':'#ffb870','on-secondary-container':'#653900',
      tertiary:'#466270','tertiary-fixed':'#c9e7f7','tertiary-fixed-dim':'#adcbda','on-tertiary-container':'#183642',
      'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',outline:'#6f7a6b','outline-variant':'#becab9',
      'surface-container-low':'#f3f4f5'
    },
    fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] }
  }}}
</script>
<style>
  body { background:#0a0a0a; min-height:100dvh; }
  .camera {
    background:
      radial-gradient(ellipse 60% 70% at 50% 40%, rgba(255,255,255,.04) 0%, transparent 60%),
      linear-gradient(135deg, #1a1f1c, #0f1410 60%, #1a1f1c);
    position:absolute; inset:0;
  }
  .camera::before, .camera::after {
    content:''; position:absolute; background: rgba(255,255,255,.04);
    border-radius: 8px;
  }
  .camera::before { left:18%; top:20%; width:18%; height:14%; transform:rotate(-4deg); }
  .camera::after { right:14%; top:55%; width:22%; height:30%; transform:rotate(3deg); }
  @keyframes scan-y { 0%,100% { top:8%; } 50% { top:88%; } }
  .scan-line { animation: scan-y 2.4s ease-in-out infinite; }
  @keyframes ping-soft {
    0% { transform: scale(.9); opacity:.7 }
    100% { transform: scale(1.4); opacity:0 }
  }
  .qr-ping { animation: ping-soft 1.8s ease-out infinite; }
</style>
</head>
<body class="text-white antialiased">

<!-- Camera background -->
<div class="camera"></div>

<!-- Top -->
<header class="relative z-10 px-3 pt-4">
  <div class="max-w-md mx-auto flex items-center justify-between">
    <button onclick="history.back()" class="w-10 h-10 rounded-full bg-black/50 backdrop-blur flex items-center justify-center">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <p class="text-[15px] font-bold text-white">QR · 바코드 스캔</p>
    <button class="w-10 h-10 rounded-full bg-black/50 backdrop-blur flex items-center justify-center">
      <span class="material-symbols-outlined">help</span>
    </button>
  </div>
</header>

<!-- Description -->
<div class="relative z-10 text-center mt-5 px-4 max-w-md mx-auto">
  <p class="text-[11.5px] font-bold text-primary-fixed-dim tracking-wide">픽업 거래 확인</p>
  <h2 class="text-[18px] font-bold mt-1 drop-shadow">상대방 QR을 스캔해 거래를 마무리하세요</h2>
  <p class="text-[12px] text-white/70 mt-1.5">상품의 바코드를 비추면 정품 정보도 확인할 수 있어요</p>
</div>

<!-- Mode segment -->
<div class="relative z-10 mt-5 flex justify-center">
  <div class="bg-black/55 backdrop-blur rounded-full p-1 flex gap-1">
    <button class="px-4 py-1.5 rounded-full bg-white text-on-surface text-[12px] font-bold">QR 코드</button>
    <button class="px-4 py-1.5 rounded-full text-white/80 text-[12px] font-semibold">바코드</button>
    <button class="px-4 py-1.5 rounded-full text-white/80 text-[12px] font-semibold">영수증</button>
  </div>
</div>

<!-- Scan frame -->
<div class="relative z-10 mt-6 flex flex-col items-center">
  <div class="relative w-72 h-72 max-w-[80vw] max-h-[80vw]">
    <!-- Dark overlay around the scan box via inset shadow -->
    <div class="absolute inset-0 rounded-3xl" style="box-shadow: 0 0 0 4000px rgba(0,0,0,.55);"></div>

    <!-- Fake QR pattern inside -->
    <div class="absolute inset-6 grid grid-cols-7 grid-rows-7 gap-0.5 opacity-95">
      <!-- corners -->
      <div class="col-span-2 row-span-2 bg-white rounded-sm relative"><div class="absolute inset-1.5 bg-on-surface"></div><div class="absolute inset-2.5 bg-white"></div></div>
      <div class="col-span-3"></div>
      <div class="col-span-2 row-span-2 bg-white rounded-sm relative"><div class="absolute inset-1.5 bg-on-surface"></div><div class="absolute inset-2.5 bg-white"></div></div>
      <div class="col-span-3 bg-white/80 rounded-sm"></div>
      <div></div><div class="bg-white/70 rounded-sm"></div><div></div>
      <div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div>
      <div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div>
      <div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div>
      <div></div><div class="bg-white/80 rounded-sm"></div><div></div>
      <div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div><div></div>
      <div class="col-span-2 row-span-2 bg-white rounded-sm relative"><div class="absolute inset-1.5 bg-on-surface"></div><div class="absolute inset-2.5 bg-white"></div></div>
      <div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div>
      <div></div><div class="bg-white/80 rounded-sm"></div><div></div><div class="bg-white/80 rounded-sm"></div>
    </div>

    <!-- Detection ring -->
    <div class="absolute inset-3 rounded-2xl ring-2 ring-primary-fixed/60 qr-ping"></div>

    <!-- Corner brackets -->
    <div class="absolute top-0 left-0 w-9 h-9 border-t-[3px] border-l-[3px] border-primary-fixed rounded-tl-xl"></div>
    <div class="absolute top-0 right-0 w-9 h-9 border-t-[3px] border-r-[3px] border-primary-fixed rounded-tr-xl"></div>
    <div class="absolute bottom-0 left-0 w-9 h-9 border-b-[3px] border-l-[3px] border-primary-fixed rounded-bl-xl"></div>
    <div class="absolute bottom-0 right-0 w-9 h-9 border-b-[3px] border-r-[3px] border-primary-fixed rounded-br-xl"></div>

    <!-- Scan line -->
    <div class="absolute left-2 right-2 h-0.5 bg-primary-fixed shadow-[0_0_18px_3px_rgba(148,249,144,.8)] scan-line"></div>
  </div>

  <p class="mt-5 text-[12px] text-white/80">QR을 사각형 안에 맞춰주세요</p>
  <div class="mt-3 flex items-center gap-2 bg-primary/90 backdrop-blur px-3 py-1.5 rounded-full">
    <span class="w-2 h-2 rounded-full bg-white"></span>
    <span class="text-[11px] font-bold">인식 중...</span>
  </div>
</div>

<!-- Controls -->
<div class="fixed left-0 right-0 bottom-32 z-10 flex justify-center gap-3">
  <button class="w-12 h-12 rounded-full bg-black/50 backdrop-blur flex items-center justify-center">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">flashlight_on</span>
  </button>
  <button class="px-4 h-12 rounded-full bg-white text-on-surface flex items-center gap-1.5 text-[12.5px] font-bold">
    <span class="material-symbols-outlined" style="font-size:18px">photo_library</span>
    이미지 불러오기
  </button>
  <button class="w-12 h-12 rounded-full bg-black/50 backdrop-blur flex items-center justify-center">
    <span class="material-symbols-outlined">keyboard</span>
  </button>
</div>

<!-- Bottom sheet -->
<section class="fixed bottom-0 left-0 right-0 bg-white text-on-surface rounded-t-3xl z-20 shadow-[0_-12px_30px_rgba(0,0,0,.4)]">
  <div class="max-w-md mx-auto px-4 pt-3 pb-6">
    <div class="w-10 h-1 bg-on-surface-variant/30 rounded-full mx-auto mb-3"></div>
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-2xl bg-tertiary-fixed/60 flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-tertiary" style="font-variation-settings:'FILL' 1;">history</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-[10.5px] font-bold text-tertiary tracking-wide">최근 스캔</p>
        <p class="text-[13.5px] font-semibold truncate">친환경 브로콜리 · 정품 인증됨</p>
        <p class="text-[10.5px] text-on-surface-variant mt-0.5">1시간 전 · 한들마트</p>
      </div>
      <span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
    </div>
  </div>
</section>

</body>
</html>
