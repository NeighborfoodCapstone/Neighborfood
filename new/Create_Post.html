<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>나눔 글쓰기 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77',
      'on-primary':'#fff','on-primary-fixed-variant':'#005313',
      secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed':'#ffdcbe','secondary-fixed-dim':'#ffb870',
      'on-secondary-container':'#653900',
      tertiary:'#466270','tertiary-fixed':'#c9e7f7','tertiary-fixed-dim':'#adcbda','on-tertiary-container':'#183642',
      'surface-container-lowest':'#ffffff','surface-container-low':'#f3f4f5','surface-container':'#edeeef',
      'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',
      outline:'#6f7a6b','outline-variant':'#becab9',
      warm:'#faf9f5'
    },
    fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] }
  }}}
</script>
<style>
  body { background:#faf9f5; }
  .ph { background: repeating-linear-gradient(135deg, #eef2ea 0 8px, #e4ebe0 8px 16px); }
  .seg { display:inline-flex; background:#eef2ea; padding:3px; border-radius:999px; }
  .seg button { padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600; color:#3f4a3c; }
  .seg button.on { background:#fff; color:#006e1c; box-shadow:0 1px 2px rgba(0,0,0,.06); }
  textarea, input[type=text], input[type=number] { font-family: inherit; }
</style>
</head>
<body class="text-on-surface antialiased pb-32">

<header class="sticky top-0 z-50 bg-warm/90 backdrop-blur border-b border-black/[.04]">
  <div class="max-w-2xl mx-auto px-3 h-14 flex items-center justify-between">
    <button onclick="history.back()" class="w-10 h-10 rounded-full hover:bg-black/5 flex items-center justify-center"><span class="material-symbols-outlined">close</span></button>
    <h1 class="text-[15px] font-bold">나눔 글쓰기</h1>
    <button class="text-[13px] font-bold text-primary px-3 py-1.5 rounded-full bg-primary-fixed/40">임시저장</button>
  </div>
  <div class="h-1 bg-black/[.04]"><div class="h-1 bg-primary w-1/3"></div></div>
</header>

<main class="max-w-2xl mx-auto px-4">

  <!-- Type segment -->
  <section class="mt-4">
    <p class="text-[11px] font-bold text-on-surface-variant tracking-wide mb-2">거래 유형</p>
    <div class="seg">
      <button class="on">🤲 나눔</button>
      <button>🔄 교환</button>
      <button>👥 공동구매</button>
    </div>
  </section>

  <!-- Photos -->
  <section class="mt-5">
    <p class="text-[11px] font-bold text-on-surface-variant tracking-wide mb-2">사진 <span class="text-on-surface/50 font-medium">(최대 10장)</span></p>
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
      <button class="shrink-0 w-20 h-20 rounded-xl border-2 border-dashed border-outline-variant bg-white flex flex-col items-center justify-center text-on-surface-variant">
        <span class="material-symbols-outlined" style="font-size:22px">add_a_photo</span>
        <span class="text-[10px] mt-0.5 font-semibold">2/10</span>
      </button>
      <div class="shrink-0 w-20 h-20 rounded-xl ph relative ring-1 ring-black/5">
        <span class="absolute top-1 left-1 text-[9px] font-bold bg-primary text-white px-1 py-0.5 rounded">대표</span>
        <button class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-on-surface text-white rounded-full flex items-center justify-center"><span class="material-symbols-outlined" style="font-size:13px">close</span></button>
      </div>
      <div class="shrink-0 w-20 h-20 rounded-xl ph relative ring-1 ring-black/5">
        <button class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-on-surface text-white rounded-full flex items-center justify-center"><span class="material-symbols-outlined" style="font-size:13px">close</span></button>
      </div>
    </div>
    <button class="mt-2 w-full text-left bg-tertiary-fixed/50 rounded-xl px-3 py-2.5 flex items-center gap-2 ring-1 ring-tertiary-fixed-dim/40">
      <span class="material-symbols-outlined text-tertiary" style="font-size:18px;font-variation-settings:'FILL' 1;">auto_awesome</span>
      <span class="text-[12.5px] flex-1 text-on-tertiary-container">사진 한 장으로 식재료를 자동 인식해드려요</span>
      <a href="AI Recognize.html" class="text-[12px] font-bold text-tertiary">시작 →</a>
    </button>
  </section>

  <!-- Title -->
  <section class="mt-5">
    <input type="text" value="유기농 시금치 두 봉지" class="w-full bg-white rounded-xl ring-1 ring-outline-variant px-4 py-3.5 text-[15px] font-semibold focus:ring-2 focus:ring-primary outline-none"/>
  </section>

  <!-- Category -->
  <section class="mt-3">
    <button class="w-full bg-white rounded-xl ring-1 ring-outline-variant px-4 py-3.5 flex items-center justify-between">
      <span class="text-[13.5px] text-on-surface-variant">카테고리</span>
      <span class="text-[13.5px] font-semibold flex items-center gap-1">🥬 채소 <span class="material-symbols-outlined text-on-surface-variant" style="font-size:18px">chevron_right</span></span>
    </button>
  </section>

  <!-- Description -->
  <section class="mt-3">
    <textarea rows="6" class="w-full bg-white rounded-xl ring-1 ring-outline-variant px-4 py-3.5 text-[14px] leading-6 focus:ring-2 focus:ring-primary outline-none resize-none" placeholder="식재료 상태, 보관 방법, 나눔 이유 등을 적어주세요.">친환경 농장에서 어제 수확한 시금치예요. 양이 많아 두 봉지로 나눠 담았고, 오늘 안에 픽업 가능하신 분께 나눠드릴게요. 냉장 보관 중입니다.</textarea>
    <div class="flex justify-between mt-1.5 text-[11px] text-on-surface-variant px-1">
      <span>예의 있는 표현 부탁드려요</span>
      <span>87 / 1,000</span>
    </div>
  </section>

  <!-- Freshness slider -->
  <section class="mt-5 bg-white rounded-2xl p-4 ring-1 ring-black/[.04]">
    <div class="flex items-center justify-between mb-2">
      <p class="text-[13px] font-bold">유통기한까지</p>
      <span class="text-[12.5px] font-bold text-secondary bg-secondary-fixed px-2 py-0.5 rounded-full">3일 남음</span>
    </div>
    <div class="relative h-2 bg-surface-container-low rounded-full">
      <div class="absolute left-0 top-0 h-2 rounded-full bg-gradient-to-r from-primary via-secondary-container to-error" style="width:35%"></div>
      <div class="absolute top-1/2 -translate-y-1/2 w-5 h-5 bg-white rounded-full ring-2 ring-secondary shadow" style="left:calc(35% - 10px)"></div>
    </div>
    <div class="flex justify-between text-[10.5px] text-on-surface-variant mt-2">
      <span>오늘</span><span>3일</span><span>7일</span><span>30일+</span>
    </div>
  </section>

  <!-- Location -->
  <section class="mt-3 bg-white rounded-2xl ring-1 ring-black/[.04] overflow-hidden">
    <div class="p-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">location_on</span>
        <p class="text-[13.5px] font-bold">거래 희망 장소</p>
      </div>
      <button class="text-[12px] font-bold text-primary">변경</button>
    </div>
    <div class="h-32 ph relative">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="bg-white rounded-full p-2 shadow-md">
          <span class="material-symbols-outlined text-error" style="font-variation-settings:'FILL' 1;">location_on</span>
        </div>
      </div>
    </div>
    <div class="p-4 border-t border-black/[.04]">
      <p class="text-[13px] font-semibold">한들마을 3단지 정문 앞</p>
      <p class="text-[11.5px] text-on-surface-variant mt-0.5">대략적인 위치만 표시되고, 채팅에서 정확한 장소를 공유해요</p>
    </div>
  </section>

  <!-- Options -->
  <section class="mt-3 bg-white rounded-2xl ring-1 ring-black/[.04] divide-y divide-black/[.04]">
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-on-surface-variant">flash_on</span>
        <div>
          <p class="text-[13.5px] font-semibold">오늘 안에 픽업</p>
          <p class="text-[11px] text-on-surface-variant">신선한 식재료에 추천해요</p>
        </div>
      </div>
      <span class="w-10 h-6 bg-primary rounded-full p-0.5 flex justify-end"><span class="w-5 h-5 bg-white rounded-full shadow"></span></span>
    </label>
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-on-surface-variant">package_2</span>
        <p class="text-[13.5px] font-semibold">비대면 거래 가능</p>
      </div>
      <span class="w-10 h-6 bg-outline-variant rounded-full p-0.5"><span class="w-5 h-5 bg-white rounded-full shadow"></span></span>
    </label>
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-on-surface-variant">verified</span>
        <div>
          <p class="text-[13.5px] font-semibold">영수증으로 인증</p>
          <p class="text-[11px] text-on-surface-variant">신뢰 온도 +0.3°</p>
        </div>
      </div>
      <a href="Receipt_Verify.html" class="text-[12px] font-bold text-primary px-3 py-1.5 rounded-full bg-primary-fixed/40">추가</a>
    </label>
  </section>

</main>

<!-- Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-black/[.06] z-40">
  <div class="max-w-2xl mx-auto px-4 py-3 pb-6 flex gap-2">
    <button class="px-4 rounded-2xl ring-1 ring-outline-variant text-[13px] font-semibold">미리보기</button>
    <button class="flex-1 bg-primary text-white rounded-2xl py-3.5 text-[14px] font-bold active:scale-[.99] transition">나눔 게시하기</button>
  </div>
</div>

</body>
</html>
