<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>로그인 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: {
    primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77','on-primary-fixed-variant':'#005313',
    secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed-dim':'#ffb870',
    'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',outline:'#6f7a6b','outline-variant':'#becab9',
    error:'#ba1a1a','surface-container-low':'#f3f4f5'
  }, fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] } }}}
</script>
<style>
  body { background:linear-gradient(180deg,#f0f6ec 0%,#faf9f5 50%); min-height:100dvh; font-family:'Plus Jakarta Sans','Noto Sans KR',system-ui; }
</style>
</head>
<body class="text-on-surface antialiased">

<header class="px-3 pt-3">
  <div class="max-w-md mx-auto flex items-center">
    <button onclick="history.back()" class="w-10 h-10 rounded-full hover:bg-black/5 flex items-center justify-center"><span class="material-symbols-outlined">arrow_back</span></button>
    <button class="ml-auto text-[12px] font-bold text-on-surface-variant flex items-center gap-0.5">한국어 <span class="material-symbols-outlined" style="font-size:14px">expand_more</span></button>
  </div>
</header>

<main class="max-w-md mx-auto px-6 pt-8 pb-12">

  <!-- Logo -->
  <div class="flex flex-col items-center mb-9">
    <div class="w-16 h-16 rounded-3xl bg-primary text-white flex items-center justify-center shadow-[0_12px_24px_rgba(0,110,28,.25)]">
      <span class="material-symbols-outlined" style="font-size:32px;font-variation-settings:'FILL' 1;">eco</span>
    </div>
    <p class="text-[24px] font-bold mt-3">다시 오신 걸 환영해요</p>
    <p class="text-[13px] text-on-surface-variant mt-1">이웃과 식재료를 나누러 가볼까요?</p>
  </div>

  <!-- Form -->
  <form class="flex flex-col gap-3">
    <label class="block">
      <span class="text-[11.5px] font-bold text-on-surface-variant ml-1">이메일</span>
      <div class="mt-1 bg-white rounded-2xl ring-1 ring-outline-variant focus-within:ring-2 focus-within:ring-primary flex items-center px-4 py-3.5">
        <span class="material-symbols-outlined text-on-surface-variant mr-2" style="font-size:18px">mail</span>
        <input type="email" value="healthy@gmail.com" class="flex-1 bg-transparent outline-none text-[14px]"/>
      </div>
    </label>

    <label class="block">
      <span class="text-[11.5px] font-bold text-on-surface-variant ml-1">비밀번호</span>
      <div class="mt-1 bg-white rounded-2xl ring-1 ring-outline-variant focus-within:ring-2 focus-within:ring-primary flex items-center px-4 py-3.5">
        <span class="material-symbols-outlined text-on-surface-variant mr-2" style="font-size:18px">lock</span>
        <input type="password" value="••••••••" class="flex-1 bg-transparent outline-none text-[14px]"/>
        <button type="button" class="text-on-surface-variant"><span class="material-symbols-outlined" style="font-size:18px">visibility</span></button>
      </div>
    </label>

    <div class="flex items-center justify-between text-[12px] mt-1">
      <label class="flex items-center gap-1.5">
        <input type="checkbox" checked class="rounded text-primary focus:ring-primary"/>
        <span>자동 로그인</span>
      </label>
      <a href="Password Reset.html" class="text-on-surface-variant font-semibold">비밀번호 잊으셨나요?</a>
    </div>

    <button type="button" class="mt-2 bg-primary text-white rounded-2xl py-4 text-[14.5px] font-bold active:scale-[.99] transition shadow-[0_8px_20px_rgba(0,110,28,.25)]">
      로그인
    </button>
  </form>

  <!-- Divider -->
  <div class="flex items-center gap-3 my-6">
    <span class="flex-1 h-px bg-outline-variant"></span>
    <span class="text-[11px] text-on-surface-variant">또는 SNS로 빠르게</span>
    <span class="flex-1 h-px bg-outline-variant"></span>
  </div>

  <!-- Social -->
  <div class="space-y-2">
    <button class="w-full bg-[#fee500] text-on-surface rounded-2xl py-3.5 text-[14px] font-bold flex items-center justify-center gap-2">
      <span class="material-symbols-outlined" style="font-size:18px">chat_bubble</span>
      카카오 계정으로 계속
    </button>
    <button class="w-full bg-[#03c75a] text-white rounded-2xl py-3.5 text-[14px] font-bold flex items-center justify-center gap-2">
      <span class="font-extrabold">N</span> 네이버 계정으로 계속
    </button>
    <button class="w-full bg-white ring-1 ring-outline-variant text-on-surface rounded-2xl py-3.5 text-[14px] font-bold flex items-center justify-center gap-2">
      <span class="text-[16px]">🍎</span> Apple로 계속
    </button>
  </div>

  <!-- Bottom -->
  <p class="text-center text-[12.5px] text-on-surface-variant mt-8">
    아직 NeighborFood가 처음이신가요? <a href="Identity Verify.html" class="text-primary font-bold ml-0.5">회원가입</a>
  </p>

  <p class="text-center text-[10.5px] text-on-surface-variant/70 mt-6 leading-relaxed">
    로그인 시 <a href="Terms.html" class="underline">이용약관</a> · <a href="Privacy.html" class="underline">개인정보처리방침</a>에<br/>동의한 것으로 간주됩니다.
  </p>
</main>
</body>
</html>
