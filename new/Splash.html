<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NeighborFood</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root { --primary:#006e1c; --primary-fixed:#94f990; --on-primary-fixed-variant:#005313; }
  html, body { margin:0; padding:0; min-height:100dvh; font-family:'Plus Jakarta Sans','Noto Sans KR',system-ui; -webkit-tap-highlight-color: transparent; }
  body {
    background:
      radial-gradient(ellipse 600px 400px at 30% 25%, rgba(255,184,112,.25), transparent 60%),
      radial-gradient(ellipse 700px 500px at 70% 85%, rgba(148,249,144,.35), transparent 60%),
      linear-gradient(160deg, #f6fbf0 0%, #faf9f5 60%, #f0f6ec 100%);
    color:#191c1d; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:48px 0;
    overflow:hidden; position:relative;
  }
  .leaf { position:absolute; opacity:.45; }
  @keyframes float-l { 0%,100% { transform: translate(0,0) rotate(-12deg); } 50% { transform: translate(8px,-12px) rotate(-4deg); }}
  @keyframes float-r { 0%,100% { transform: translate(0,0) rotate(18deg); } 50% { transform: translate(-10px,-14px) rotate(8deg); }}
  .leaf-1 { top:8%; left:8%; animation: float-l 6s ease-in-out infinite; }
  .leaf-2 { top:14%; right:10%; animation: float-r 7s ease-in-out infinite; }
  .leaf-3 { bottom:22%; left:6%; animation: float-l 8s ease-in-out infinite; }
  .leaf-4 { bottom:18%; right:8%; animation: float-r 6.5s ease-in-out infinite; }

  .logo-wrap {
    margin-top: 14vh;
    display:flex; flex-direction:column; align-items:center;
  }
  .logo-box {
    width:120px; height:120px; border-radius:36px;
    background: linear-gradient(160deg, #006e1c, #004510);
    color:white; display:grid; place-items:center;
    box-shadow: 0 24px 50px -16px rgba(0,110,28,.45), 0 8px 20px rgba(0,110,28,.2);
    position:relative;
  }
  .logo-box::after {
    content:''; position:absolute; inset:-8px; border-radius:42px;
    border:2px solid rgba(148,249,144,.5);
    animation: ring 2.2s ease-in-out infinite;
  }
  @keyframes ring { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(1.08); } }

  .wordmark { font-size:34px; font-weight:800; letter-spacing:-.025em; margin-top:24px; }
  .tagline { color:#3f4a3c; font-size:14px; margin-top:6px; text-align:center; font-weight:500; }
  .tagline b { color: var(--primary); }

  .loader { margin-top: auto; margin-bottom: 12px; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .dots { display:flex; gap:6px; }
  .dot { width:7px; height:7px; border-radius:50%; background: var(--primary); opacity:.4; animation: blink 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes blink { 0%,80%,100% { opacity:.25; transform:translateY(0);} 40% { opacity:1; transform:translateY(-3px);}}
  .loader p { color:#3f4a3c; font-size:12px; font-weight:600; margin:0; }
  .footer { color:#6f7a6b; font-size:10.5px; }
</style>
</head>
<body>

<!-- floating leaves -->
<span class="leaf leaf-1 material-symbols-outlined" style="font-size:42px; color:#94f990; font-variation-settings:'FILL' 1;">eco</span>
<span class="leaf leaf-2 material-symbols-outlined" style="font-size:36px; color:#ffb870; font-variation-settings:'FILL' 1;">spa</span>
<span class="leaf leaf-3 material-symbols-outlined" style="font-size:48px; color:#adcbda; font-variation-settings:'FILL' 1;">spa</span>
<span class="leaf leaf-4 material-symbols-outlined" style="font-size:38px; color:#94f990; font-variation-settings:'FILL' 1;">eco</span>

<div class="logo-wrap">
  <div class="logo-box">
    <span class="material-symbols-outlined" style="font-size:62px;font-variation-settings:'FILL' 1;">eco</span>
  </div>
  <p class="wordmark">NeighborFood</p>
  <p class="tagline">우리 동네에서 <b>식재료를 나누는</b><br/>가장 따뜻한 방법</p>
</div>

<div class="loader">
  <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <p>이웃과 식재료를 잇는 중…</p>
</div>

<p class="footer">© NeighborFood Inc. · v 2.4.2</p>

<script>
  // Auto-navigate to onboarding after 1.6s (only on user click for demo)
  setTimeout(() => {
    // demo only — don't auto navigate in preview
  }, 1600);
  document.body.addEventListener('click', () => location.href = 'Onboarding.html');
</script>

</body>
</html>
