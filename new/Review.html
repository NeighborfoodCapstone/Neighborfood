<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>거래 후기 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: {
    primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77','on-primary-fixed-variant':'#005313','on-primary-fixed':'#002204',
    secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed':'#ffdcbe','secondary-fixed-dim':'#ffb870','on-secondary-fixed-variant':'#693c00',
    tertiary:'#466270','tertiary-fixed-dim':'#adcbda','on-tertiary-container':'#183642',
    'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',outline:'#6f7a6b','outline-variant':'#becab9',
    'surface-container-low':'#f3f4f5','surface-container':'#edeeef',
    warm:'#faf9f5'
  }, fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] } }}}
</script>
<style>
  body { background:#faf9f5; min-height:max(884px,100dvh); font-family:'Plus Jakarta Sans','Noto Sans KR',system-ui; }
  .ring-soft { box-shadow: 0 0 0 1px rgba(0,0,0,.05); }
  .ph { background: repeating-linear-gradient(135deg, #eef2ea 0 8px, #e4ebe0 8px 16px); }
  .chip { padding:8px 12px; border-radius:9999px; font-size:12.5px; font-weight:600; background:#fff; color:#3f4a3c; box-shadow: 0 0 0 1px rgba(0,0,0,.06); cursor:pointer; }
  .chip.on { background:#94f990; color:#005313; box-shadow:none; }
  .chip.bad.on { background:#ffdad6; color:#93000a; }
  .star-row { display:inline-flex; gap:2px; }
  .star { font-size: 38px; color:#e7e8e9; cursor:pointer; transition: transform .1s; }
  .star.on { color:#f5b056; }
  .star:active { transform: scale(1.15); }
</style>
</head>
<body class="text-on-surface antialiased pb-32">

<header class="sticky top-0 z-40 bg-warm/90 backdrop-blur border-b border-black/[.04]">
  <div class="max-w-2xl mx-auto px-3 h-14 flex items-center">
    <button onclick="history.back()" class="w-10 h-10 rounded-full hover:bg-black/5 flex items-center justify-center"><span class="material-symbols-outlined">close</span></button>
    <h1 class="text-[15px] font-bold ml-1">거래 후기 남기기</h1>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 pt-5">

  <!-- Partner -->
  <section class="text-center">
    <div class="relative inline-block">
      <div class="w-20 h-20 rounded-3xl bg-primary-fixed flex items-center justify-center text-on-primary-fixed-variant text-[26px] font-bold ring-4 ring-white shadow-sm">민</div>
      <span class="absolute -top-1 -right-1 w-8 h-8 rounded-full bg-white ring-2 ring-primary flex items-center justify-center">
        <span class="material-symbols-outlined text-primary" style="font-size:18px;font-variation-settings:'FILL' 1;">eco</span>
      </span>
    </div>
    <h2 class="text-[20px] font-bold mt-3">민지 이웃과의 거래는<br/>어떠셨나요?</h2>
    <p class="text-[12.5px] text-on-surface-variant mt-1.5">유기농 시금치 두 봉지 · 오늘 18:14 완료</p>
  </section>

  <!-- Star -->
  <section class="mt-5 bg-white rounded-3xl ring-soft p-5 text-center">
    <p class="text-[11.5px] font-bold text-on-surface-variant tracking-wide mb-2">전체 만족도</p>
    <div class="star-row">
      <span class="star material-symbols-outlined on" style="font-variation-settings:'FILL' 1;">star</span>
      <span class="star material-symbols-outlined on" style="font-variation-settings:'FILL' 1;">star</span>
      <span class="star material-symbols-outlined on" style="font-variation-settings:'FILL' 1;">star</span>
      <span class="star material-symbols-outlined on" style="font-variation-settings:'FILL' 1;">star</span>
      <span class="star material-symbols-outlined on" style="font-variation-settings:'FILL' 1;">star</span>
    </div>
    <p class="text-[13.5px] font-bold text-primary mt-1.5">5점 · 최고예요!</p>
  </section>

  <!-- Good -->
  <section class="mt-4">
    <p class="text-[12.5px] font-bold mb-2">이웃의 어떤 점이 좋았어요? <span class="text-on-surface-variant font-medium text-[11px]">(복수 선택)</span></p>
    <div class="flex flex-wrap gap-1.5">
      <button class="chip on">⏰ 시간 약속을 잘 지켜요</button>
      <button class="chip on">🥬 식재료가 신선했어요</button>
      <button class="chip on">🤝 친절하게 응대해 주셨어요</button>
      <button class="chip">📦 포장이 깔끔했어요</button>
      <button class="chip">💬 답장이 빨라요</button>
      <button class="chip">🎁 덤으로 더 주셨어요</button>
      <button class="chip">🛁 위생적으로 보관됐어요</button>
    </div>
  </section>

  <!-- Bad (collapsed) -->
  <section class="mt-4">
    <details class="bg-white rounded-2xl ring-soft p-3.5">
      <summary class="text-[12.5px] font-bold text-on-surface-variant cursor-pointer flex items-center gap-2">
        <span class="material-symbols-outlined" style="font-size:18px">sentiment_dissatisfied</span>
        아쉬웠던 점이 있다면? (선택)
      </summary>
      <div class="mt-3 flex flex-wrap gap-1.5">
        <button class="chip bad">시간 약속이 늦었어요</button>
        <button class="chip bad">설명과 달랐어요</button>
        <button class="chip bad">답장이 늦었어요</button>
        <button class="chip bad">매너가 아쉬웠어요</button>
      </div>
    </details>
  </section>

  <!-- Comment -->
  <section class="mt-4">
    <div class="flex items-center justify-between mb-2">
      <p class="text-[12.5px] font-bold">한마디 후기 <span class="text-on-surface-variant font-medium text-[11px]">(선택)</span></p>
      <p class="text-[10.5px] text-on-surface-variant">28 / 200</p>
    </div>
    <textarea rows="4" class="w-full bg-white rounded-2xl ring-1 ring-outline-variant px-4 py-3.5 text-[13.5px] resize-none focus:ring-2 focus:ring-primary outline-none">시금치 정말 싱싱했어요. 약속 시간도 잘 지켜주셨고요. 또 거래하고 싶어요!</textarea>
    <div class="mt-2 flex gap-1.5 overflow-x-auto no-scrollbar">
      <button class="shrink-0 chip">또 거래하고 싶어요</button>
      <button class="shrink-0 chip">감사합니다 🙏</button>
      <button class="shrink-0 chip">다른 분께 추천해요</button>
    </div>
  </section>

  <!-- Re-trade -->
  <section class="mt-4 bg-white rounded-2xl ring-soft divide-y divide-black/[.05]">
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">favorite</span>
        <div>
          <p class="text-[13.5px] font-semibold">재거래 희망</p>
          <p class="text-[11px] text-on-surface-variant">상대 이웃에게 표시돼요</p>
        </div>
      </div>
      <span class="w-10 h-6 bg-primary rounded-full p-0.5 flex justify-end"><span class="w-5 h-5 bg-white rounded-full shadow"></span></span>
    </label>
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-on-surface-variant" style="font-size:22px">visibility</span>
        <p class="text-[13.5px] font-semibold">동네 피드에 공개</p>
      </div>
      <span class="w-10 h-6 bg-primary rounded-full p-0.5 flex justify-end"><span class="w-5 h-5 bg-white rounded-full shadow"></span></span>
    </label>
  </section>

  <!-- Trust temperature feedback -->
  <section class="mt-4 bg-primary-fixed/30 ring-1 ring-primary-fixed-dim/40 rounded-2xl p-4 flex items-center gap-3">
    <span class="material-symbols-outlined text-primary shrink-0" style="font-size:24px;font-variation-settings:'FILL' 1;">thermostat</span>
    <p class="text-[12px] text-on-primary-fixed-variant flex-1">민지 이웃의 신뢰 온도가 <b>+0.5°</b> 올라가요</p>
  </section>
</main>

<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-black/[.06] z-40">
  <div class="max-w-2xl mx-auto px-4 py-3 pb-6 flex gap-2">
    <button class="px-4 rounded-2xl ring-1 ring-outline-variant bg-white text-[13px] font-semibold">건너뛰기</button>
    <button class="flex-1 bg-primary text-white rounded-2xl py-3.5 text-[14px] font-bold">후기 남기기</button>
  </div>
</div>
</body>
</html>
