<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>거래 장소 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77',
      'on-primary':'#fff','on-primary-fixed-variant':'#005313',
      secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed':'#ffdcbe','secondary-fixed-dim':'#ffb870',
      tertiary:'#466270','tertiary-fixed':'#c9e7f7','tertiary-fixed-dim':'#adcbda','on-tertiary-container':'#183642',
      'surface-container-lowest':'#ffffff','surface-container-low':'#f3f4f5',
      'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',
      outline:'#6f7a6b','outline-variant':'#becab9',
      warm:'#faf9f5'
    },
    fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] }
  }}}
</script>
<style>
  body { background:#faf9f5; }
  .map-bg {
    background:
      radial-gradient(circle at 30% 40%, #d8e5d3 0%, transparent 18%),
      radial-gradient(circle at 70% 60%, #e1dccd 0%, transparent 18%),
      linear-gradient(135deg, #eef2ea 25%, #e7eee0 25%, #e7eee0 50%, #eef2ea 50%, #eef2ea 75%, #e7eee0 75%);
    background-size: auto, auto, 60px 60px;
  }
  .road { position:absolute; background:#fff; box-shadow: 0 0 0 1px rgba(0,0,0,.04); }
</style>
</head>
<body class="text-on-surface antialiased">

<!-- Map full screen -->
<div class="fixed inset-0 map-bg">
  <!-- Roads -->
  <div class="road" style="top:30%; left:0; right:0; height:14px;"></div>
  <div class="road" style="top:65%; left:0; right:0; height:18px;"></div>
  <div class="road" style="left:55%; top:0; bottom:0; width:14px;"></div>
  <div class="road" style="left:20%; top:0; bottom:30%; width:10px;"></div>
  <!-- Buildings -->
  <div class="absolute bg-white/80 ring-1 ring-black/5 rounded-md" style="top:38%; left:25%; width:60px; height:48px;"></div>
  <div class="absolute bg-white/80 ring-1 ring-black/5 rounded-md" style="top:38%; left:62%; width:80px; height:48px;"></div>
  <div class="absolute bg-white/80 ring-1 ring-black/5 rounded-md" style="top:71%; left:25%; width:90px; height:60px;"></div>
  <div class="absolute bg-white/80 ring-1 ring-black/5 rounded-md" style="top:71%; left:62%; width:60px; height:60px;"></div>
  <!-- Park -->
  <div class="absolute rounded-2xl" style="top:8%; left:30%; width:60px; height:60px; background:radial-gradient(circle at 50% 50%, #c8dcb6, #b5cd9d);"></div>
  <p class="absolute text-[10px] font-semibold text-on-surface-variant" style="top:14%; left:33%;">한들공원</p>

  <!-- Pin -->
  <div class="absolute" style="top:48%; left:50%; transform:translate(-50%, -100%);">
    <div class="relative">
      <div class="w-12 h-12 rounded-full bg-error/30 absolute -top-1 -left-1 animate-ping"></div>
      <div class="w-10 h-10 rounded-full bg-error flex items-center justify-center shadow-lg ring-4 ring-white">
        <span class="material-symbols-outlined text-white" style="font-variation-settings:'FILL' 1;">location_on</span>
      </div>
    </div>
  </div>
  <div class="absolute bg-white rounded-lg shadow-md px-2.5 py-1.5 ring-1 ring-black/5" style="top:42%; left:50%; transform:translate(-50%, -100%);">
    <p class="text-[11px] font-bold whitespace-nowrap">한들마을 3단지 정문 앞</p>
  </div>
</div>

<!-- Top -->
<header class="relative z-10 pt-3 px-3 pt-safe">
  <div class="max-w-2xl mx-auto flex items-center justify-between">
    <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white shadow-md flex items-center justify-center"><span class="material-symbols-outlined">arrow_back</span></button>
    <button class="px-3 h-10 rounded-full bg-white shadow-md flex items-center gap-1.5 text-[12.5px] font-bold">
      <span class="material-symbols-outlined" style="font-size:18px">share_location</span>
      위치 공유
    </button>
  </div>
</header>

<!-- Floating zoom controls -->
<div class="fixed right-3 top-1/2 -translate-y-1/2 z-10 flex flex-col gap-1.5">
  <button class="w-10 h-10 rounded-xl bg-white shadow-md flex items-center justify-center"><span class="material-symbols-outlined">add</span></button>
  <button class="w-10 h-10 rounded-xl bg-white shadow-md flex items-center justify-center"><span class="material-symbols-outlined">remove</span></button>
  <button class="w-10 h-10 rounded-xl bg-white shadow-md flex items-center justify-center mt-1"><span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">my_location</span></button>
</div>

<!-- Bottom sheet -->
<section class="fixed bottom-0 left-0 right-0 bg-white rounded-t-3xl z-20 shadow-[0_-8px_24px_rgba(0,0,0,.08)]">
  <div class="max-w-2xl mx-auto px-4 pt-3 pb-6">
    <div class="w-10 h-1 bg-outline-variant rounded-full mx-auto mb-3"></div>

    <div class="flex items-start gap-3">
      <div class="w-12 h-12 rounded-2xl bg-primary-fixed flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined text-on-primary-fixed-variant" style="font-variation-settings:'FILL' 1;">storefront</span>
      </div>
      <div class="flex-1">
        <p class="text-[10.5px] font-bold text-primary tracking-wide">추천 거래 장소</p>
        <h2 class="text-[16px] font-bold mt-0.5">한들마을 3단지 정문 앞</h2>
        <p class="text-[12px] text-on-surface-variant mt-0.5">서울 마포구 한들로 33 · 도보 약 4분</p>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-2 mt-4">
      <div class="bg-surface-container-low rounded-xl p-2.5 text-center">
        <p class="text-[10px] text-on-surface-variant">거리</p>
        <p class="text-[14px] font-bold mt-0.5">280m</p>
      </div>
      <div class="bg-surface-container-low rounded-xl p-2.5 text-center">
        <p class="text-[10px] text-on-surface-variant">도보</p>
        <p class="text-[14px] font-bold mt-0.5">4분</p>
      </div>
      <div class="bg-surface-container-low rounded-xl p-2.5 text-center">
        <p class="text-[10px] text-on-surface-variant">CCTV</p>
        <p class="text-[14px] font-bold mt-0.5 text-primary">있음</p>
      </div>
    </div>

    <!-- Tips -->
    <div class="mt-3 bg-tertiary-fixed/40 rounded-2xl p-3 flex gap-2 ring-1 ring-tertiary-fixed-dim/40">
      <span class="material-symbols-outlined text-tertiary shrink-0" style="font-size:18px;font-variation-settings:'FILL' 1;">tips_and_updates</span>
      <div>
        <p class="text-[12.5px] font-bold text-on-tertiary-container">안전 거래 장소예요</p>
        <p class="text-[11.5px] text-on-tertiary-container/80 mt-0.5">사람이 자주 다니는 정문 부근, 의자도 있어 잠깐 인사 나누기 좋아요.</p>
      </div>
    </div>

    <!-- Buttons -->
    <div class="grid grid-cols-2 gap-2 mt-4">
      <button class="bg-surface-container-low rounded-2xl py-3 flex items-center justify-center gap-1.5 text-[13px] font-semibold">
        <span class="material-symbols-outlined" style="font-size:18px">directions_walk</span>
        길찾기
      </button>
      <a href="Chat Detail.html" class="bg-primary text-white rounded-2xl py-3 flex items-center justify-center gap-1.5 text-[13px] font-bold">
        <span class="material-symbols-outlined" style="font-size:18px">chat</span>
        채팅으로 공유
      </a>
    </div>
  </div>
</section>

</body>
</html>
