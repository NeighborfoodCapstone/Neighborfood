<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>비밀번호 재설정 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: { colors: {
    primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77','on-primary-fixed-variant':'#005313',
    secondary:'#8b5000','secondary-fixed':'#ffdcbe',
    'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',outline:'#6f7a6b','outline-variant':'#becab9',
    error:'#ba1a1a','surface-container-low':'#f3f4f5'
  }, fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] } }}}
</script>
<style>
  body { background:linear-gradient(180deg,#f0f6ec 0%,#faf9f5 50%); min-height:max(884px,100dvh); font-family:'Plus Jakarta Sans','Noto Sans KR',system-ui; }
  .strength { height:6px; border-radius:9999px; background:#e7e8e9; overflow:hidden; }
  .strength div { height:100%; transition: width .25s; background: linear-gradient(90deg,#ba1a1a,#ffb870,#94f990,#006e1c); width:75%; }
</style>
</head>
<body class="text-on-surface antialiased pb-12">

<header class="px-3 pt-3">
  <div class="max-w-md mx-auto flex items-center">
    <button onclick="history.back()" class="w-10 h-10 rounded-full hover:bg-black/5 flex items-center justify-center"><span class="material-symbols-outlined">arrow_back</span></button>
  </div>
</header>

<main class="max-w-md mx-auto px-6 pt-4">

  <!-- Step indicator -->
  <div class="flex items-center gap-1.5 mb-6">
    <div class="flex-1 h-1 rounded bg-primary"></div>
    <div class="flex-1 h-1 rounded bg-primary"></div>
    <div class="flex-1 h-1 rounded bg-outline-variant"></div>
  </div>

  <!-- Icon -->
  <div class="flex flex-col items-center mb-5">
    <div class="w-16 h-16 rounded-3xl bg-primary text-white flex items-center justify-center shadow-[0_12px_24px_rgba(0,110,28,.25)]">
      <span class="material-symbols-outlined" style="font-size:30px;font-variation-settings:'FILL' 1;">key</span>
    </div>
    <h1 class="text-[22px] font-bold mt-3 text-center">새 비밀번호를 만들어요</h1>
    <p class="text-[12.5px] text-on-surface-variant mt-1.5 text-center leading-relaxed">전화번호 인증을 마쳤어요.<br/>새 비밀번호로 변경해 주세요.</p>
  </div>

  <!-- Form -->
  <form class="flex flex-col gap-3">
    <label class="block">
      <span class="text-[11.5px] font-bold text-on-surface-variant ml-1">새 비밀번호</span>
      <div class="mt-1 bg-white rounded-2xl ring-1 ring-outline-variant focus-within:ring-2 focus-within:ring-primary flex items-center px-4 py-3.5">
        <span class="material-symbols-outlined text-on-surface-variant mr-2" style="font-size:18px">lock</span>
        <input type="password" value="••••••••••" class="flex-1 bg-transparent outline-none text-[14px]"/>
        <button type="button" class="text-on-surface-variant"><span class="material-symbols-outlined" style="font-size:18px">visibility</span></button>
      </div>
    </label>

    <!-- Strength meter -->
    <div>
      <div class="strength"><div></div></div>
      <div class="flex items-center justify-between mt-1.5 text-[10.5px]">
        <span class="text-primary font-bold">강함</span>
        <span class="text-on-surface-variant">크래킹 예상 시간 · 약 5년</span>
      </div>
    </div>

    <!-- Rules -->
    <ul class="text-[11.5px] mt-1 space-y-1.5">
      <li class="flex items-center gap-1.5 text-primary"><span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1;">check_circle</span>8자 이상 16자 이내</li>
      <li class="flex items-center gap-1.5 text-primary"><span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1;">check_circle</span>영문 대·소문자 포함</li>
      <li class="flex items-center gap-1.5 text-primary"><span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:'FILL' 1;">check_circle</span>숫자 포함</li>
      <li class="flex items-center gap-1.5 text-on-surface-variant"><span class="material-symbols-outlined" style="font-size:14px">radio_button_unchecked</span>특수문자 1개 이상 (권장)</li>
    </ul>

    <label class="block mt-2">
      <span class="text-[11.5px] font-bold text-on-surface-variant ml-1">새 비밀번호 확인</span>
      <div class="mt-1 bg-white rounded-2xl ring-2 ring-primary flex items-center px-4 py-3.5">
        <span class="material-symbols-outlined text-on-surface-variant mr-2" style="font-size:18px">lock</span>
        <input type="password" value="••••••••••" class="flex-1 bg-transparent outline-none text-[14px]"/>
        <span class="material-symbols-outlined text-primary" style="font-size:18px;font-variation-settings:'FILL' 1;">check_circle</span>
      </div>
      <p class="text-[11px] text-primary font-semibold mt-1.5 ml-1 flex items-center gap-1">
        <span class="material-symbols-outlined" style="font-size:12px;font-variation-settings:'FILL' 1;">check</span>
        비밀번호가 일치해요
      </p>
    </label>

    <!-- Tip -->
    <div class="mt-3 bg-primary-fixed/30 ring-1 ring-primary-fixed-dim/40 rounded-2xl p-3.5 flex gap-2">
      <span class="material-symbols-outlined text-primary shrink-0" style="font-size:18px;font-variation-settings:'FILL' 1;">tips_and_updates</span>
      <p class="text-[11.5px] text-on-primary-fixed-variant leading-relaxed">생년월일, 전화번호, "qwerty1234"처럼 추측하기 쉬운 조합은 피해주세요.</p>
    </div>

    <button type="button" class="mt-3 bg-primary text-white rounded-2xl py-4 text-[14.5px] font-bold active:scale-[.99] transition shadow-[0_8px_20px_rgba(0,110,28,.25)]">
      비밀번호 변경하기
    </button>
  </form>

  <p class="text-center text-[12px] mt-5">
    비밀번호가 기억나셨나요? <a href="Login.html" class="text-primary font-bold ml-0.5">로그인으로</a>
  </p>
</main>
</body>
</html>
