<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>나눔 글쓰기 - NeighborFood</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="shared/tokens.css" rel="stylesheet"/>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      primary:'#006e1c','primary-fixed':'#94f990','primary-fixed-dim':'#78dc77',
      'on-primary':'#fff','on-primary-fixed-variant':'#005313',
      secondary:'#8b5000','secondary-container':'#ff9800','secondary-fixed':'#ffdcbe','secondary-fixed-dim':'#ffb870',
      'on-secondary-container':'#653900',
      tertiary:'#466270','tertiary-fixed':'#c9e7f7','tertiary-fixed-dim':'#adcbda','on-tertiary-container':'#183642',
      'surface-container-lowest':'#ffffff','surface-container-low':'#f3f4f5','surface-container':'#edeeef',
      'on-surface':'#191c1d','on-surface-variant':'#3f4a3c',
      outline:'#6f7a6b','outline-variant':'#becab9',
      warm:'#faf9f5'
    },
    fontFamily:{ sans:['"Plus Jakarta Sans"','"Noto Sans KR"','system-ui'] }
  }}}
</script>
<style>
  body { background:#faf9f5; }
  .ph { background: repeating-linear-gradient(135deg, #eef2ea 0 8px, #e4ebe0 8px 16px); }
  .seg { display:inline-flex; background:#eef2ea; padding:3px; border-radius:999px; }
  .seg button { padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600; color:#3f4a3c; }
  .seg button.on { background:#fff; color:#006e1c; box-shadow:0 1px 2px rgba(0,0,0,.06); }
  textarea, input[type=text], input[type=number] { font-family: inherit; }
</style>
</head>
<body class="text-on-surface antialiased pb-32">

<header class="sticky top-0 z-50 bg-warm/90 backdrop-blur border-b border-black/[.04]">
  <div class="max-w-2xl mx-auto px-3 h-14 flex items-center justify-between">
    <button onclick="history.back()" class="w-10 h-10 rounded-full hover:bg-black/5 flex items-center justify-center"><span class="material-symbols-outlined">close</span></button>
    <h1 class="text-[15px] font-bold">나눔 글쓰기</h1>
    <button class="text-[13px] font-bold text-primary px-3 py-1.5 rounded-full bg-primary-fixed/40">임시저장</button>
  </div>
  <div class="h-1 bg-black/[.04]"><div class="h-1 bg-primary w-1/3"></div></div>
</header>

<main class="max-w-2xl mx-auto px-4">

  <!-- Type segment -->
  <section class="mt-4">
    <p class="text-[11px] font-bold text-on-surface-variant tracking-wide mb-2">거래 유형</p>
    <div class="seg" id="typeSeg">
      <button type="button" data-type="share" class="on">🤲 나눔</button>
      <button type="button" data-type="exchange">🔄 교환</button>
      <button type="button" data-type="groupbuy">👥 공동구매</button>
    </div>
  </section>

  <!-- Photos -->
  <section class="mt-5">
    <p class="text-[11px] font-bold text-on-surface-variant tracking-wide mb-2">사진 <span class="text-on-surface/50 font-medium">(최대 10장)</span></p>
    <div id="photoStrip" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
      <label class="shrink-0 w-20 h-20 rounded-xl border-2 border-dashed border-outline-variant bg-white flex flex-col items-center justify-center text-on-surface-variant cursor-pointer">
        <input id="photoInput" type="file" accept="image/*" multiple class="hidden"/>
        <span class="material-symbols-outlined" style="font-size:22px">add_a_photo</span>
        <span id="photoCount" class="text-[10px] mt-0.5 font-semibold">0/10</span>
      </label>
      <!-- 업로드된 미리보기는 여기에 동적으로 추가됩니다 -->
    </div>
    <button class="mt-2 w-full text-left bg-tertiary-fixed/50 rounded-xl px-3 py-2.5 flex items-center gap-2 ring-1 ring-tertiary-fixed-dim/40">
      <span class="material-symbols-outlined text-tertiary" style="font-size:18px;font-variation-settings:'FILL' 1;">auto_awesome</span>
      <span class="text-[12.5px] flex-1 text-on-tertiary-container">사진 한 장으로 식재료를 자동 인식해드려요</span>
      <a href="AI Recognize.html" class="text-[12px] font-bold text-tertiary">시작 →</a>
    </button>
  </section>

  <!-- Title -->
  <section class="mt-5">
    <input id="titleInput" type="text" placeholder="제목을 입력해주세요" class="w-full bg-white rounded-xl ring-1 ring-outline-variant px-4 py-3.5 text-[15px] font-semibold focus:ring-2 focus:ring-primary outline-none"/>
  </section>

  <!-- Category -->
  <section class="mt-3">
    <div class="w-full bg-white rounded-xl ring-1 ring-outline-variant px-4 py-2 flex items-center justify-between">
      <span class="text-[13.5px] text-on-surface-variant">카테고리</span>
      <select id="categoryInput" class="text-[13.5px] font-semibold bg-transparent outline-none py-1.5 pr-2">
        <option value="채소">🥬 채소</option>
        <option value="과일">🍎 과일</option>
        <option value="육류">🥩 육류</option>
        <option value="베이커리">🍞 베이커리</option>
        <option value="유제품">🥛 유제품</option>
        <option value="기본 식재료">🌾 기본 식재료</option>
        <option value="기타">기타</option>
      </select>
    </div>
  </section>

  <!-- Description -->
  <section class="mt-3">
    <textarea id="descInput" rows="6" class="w-full bg-white rounded-xl ring-1 ring-outline-variant px-4 py-3.5 text-[14px] leading-6 focus:ring-2 focus:ring-primary outline-none resize-none" placeholder="식재료 상태, 보관 방법, 나눔 이유 등을 적어주세요."></textarea>
    <div class="flex justify-between mt-1.5 text-[11px] text-on-surface-variant px-1">
      <span>예의 있는 표현 부탁드려요</span>
      <span><span id="descCount">0</span> / 1,000</span>
    </div>
  </section>

  <!-- ▼ 교환·공동구매에만 보이는 추가 입력 -->
  <section id="exchangeSection" class="mt-3 hidden">
    <p class="text-[11px] font-bold text-on-surface-variant tracking-wide mb-2">교환을 원하는 품목</p>
    <input id="exchangeWantInput" type="text" placeholder="예: 당근 1개, 사워도우 빵 등" class="w-full bg-white rounded-xl ring-1 ring-outline-variant px-4 py-3.5 text-[14px] focus:ring-2 focus:ring-primary outline-none"/>
  </section>

  <section id="groupbuySection" class="mt-3 hidden">
    <p class="text-[11px] font-bold text-on-surface-variant tracking-wide mb-2">공동구매 조건</p>
    <div class="bg-white rounded-xl ring-1 ring-outline-variant divide-y divide-black/[.05]">
      <label class="flex items-center justify-between px-4 py-3">
        <span class="text-[13.5px]">목표 인원</span>
        <input id="gbTargetInput" type="number" min="2" max="20" placeholder="4" class="w-20 text-right bg-transparent outline-none text-[14px] font-semibold"/>
      </label>
      <label class="flex items-center justify-between px-4 py-3">
        <span class="text-[13.5px]">1인당 가격(원)</span>
        <input id="gbPriceInput" type="number" min="0" placeholder="12000" class="w-28 text-right bg-transparent outline-none text-[14px] font-semibold"/>
      </label>
    </div>
  </section>

  <!-- Freshness slider -->
  <section class="mt-5 bg-white rounded-2xl p-4 ring-1 ring-black/[.04]">
    <div class="flex items-center justify-between mb-2">
      <p class="text-[13px] font-bold">유통기한까지</p>
      <span class="text-[12.5px] font-bold text-secondary bg-secondary-fixed px-2 py-0.5 rounded-full">3일 남음</span>
    </div>
    <div class="relative h-2 bg-surface-container-low rounded-full">
      <div class="absolute left-0 top-0 h-2 rounded-full bg-gradient-to-r from-primary via-secondary-container to-error" style="width:35%"></div>
      <div class="absolute top-1/2 -translate-y-1/2 w-5 h-5 bg-white rounded-full ring-2 ring-secondary shadow" style="left:calc(35% - 10px)"></div>
    </div>
    <div class="flex justify-between text-[10.5px] text-on-surface-variant mt-2">
      <span>오늘</span><span>3일</span><span>7일</span><span>30일+</span>
    </div>
  </section>

  <!-- Location -->
  <section class="mt-3 bg-white rounded-2xl ring-1 ring-black/[.04] overflow-hidden">
    <div class="p-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">location_on</span>
        <p class="text-[13.5px] font-bold">거래 희망 장소</p>
      </div>
      <button class="text-[12px] font-bold text-primary">변경</button>
    </div>
    <div class="h-32 ph relative">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="bg-white rounded-full p-2 shadow-md">
          <span class="material-symbols-outlined text-error" style="font-variation-settings:'FILL' 1;">location_on</span>
        </div>
      </div>
    </div>
    <div class="p-4 border-t border-black/[.04]">
      <p id="addressInput" class="text-[13px] font-semibold">한들마을 3단지 정문 앞</p>
      <p class="text-[11.5px] text-on-surface-variant mt-0.5">대략적인 위치만 표시되고, 채팅에서 정확한 장소를 공유해요</p>
    </div>
  </section>

  <!-- Options -->
  <section class="mt-3 bg-white rounded-2xl ring-1 ring-black/[.04] divide-y divide-black/[.04]">
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-on-surface-variant">flash_on</span>
        <div>
          <p class="text-[13.5px] font-semibold">오늘 안에 픽업</p>
          <p class="text-[11px] text-on-surface-variant">신선한 식재료에 추천해요</p>
        </div>
      </div>
      <span class="w-10 h-6 bg-primary rounded-full p-0.5 flex justify-end"><span class="w-5 h-5 bg-white rounded-full shadow"></span></span>
    </label>
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-on-surface-variant">package_2</span>
        <p class="text-[13.5px] font-semibold">비대면 거래 가능</p>
      </div>
      <span class="w-10 h-6 bg-outline-variant rounded-full p-0.5"><span class="w-5 h-5 bg-white rounded-full shadow"></span></span>
    </label>
    <label class="flex items-center justify-between px-4 py-3.5">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-on-surface-variant">verified</span>
        <div>
          <p class="text-[13.5px] font-semibold">영수증으로 인증</p>
          <p class="text-[11px] text-on-surface-variant">신뢰 온도 +0.3°</p>
        </div>
      </div>
      <a href="Receipt_Verify.html" class="text-[12px] font-bold text-primary px-3 py-1.5 rounded-full bg-primary-fixed/40">추가</a>
    </label>
  </section>

</main>

<!-- Bottom CTA -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-black/[.06] z-40">
  <div class="max-w-2xl mx-auto px-4 py-3 pb-6 flex gap-2">
    <button type="button" class="px-4 rounded-2xl ring-1 ring-outline-variant text-[13px] font-semibold">미리보기</button>
    <button id="submitBtn" type="button" class="flex-1 bg-primary text-white rounded-2xl py-3.5 text-[14px] font-bold active:scale-[.99] transition">나눔 게시하기</button>
  </div>
</div>

<!-- ─────────── 게시글 작성 로직 ─────────── -->
<script>
  // 시연용: 로그인 미구현이라 author_id를 하드코딩
  const CURRENT_USER_ID = 'user_demo_01';
  // 백엔드 주소 - 같은 호스트면 빈 문자열로 두면 되고, 다른 포트면 절대 주소
  const API_BASE = 'http://127.0.0.1:8000';

  // 현재 선택된 거래 유형 ('share' | 'exchange' | 'groupbuy')
  let currentType = 'share';
  // 업로드 완료된 이미지 파일명 (서버가 돌려준 uuid 파일명)
  let uploadedImages = [];

  // ── 거래 유형 토글 ──
  const typeSeg = document.getElementById('typeSeg');
  const exchangeSection = document.getElementById('exchangeSection');
  const groupbuySection = document.getElementById('groupbuySection');
  const submitBtn = document.getElementById('submitBtn');

  typeSeg.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      typeSeg.querySelectorAll('button').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      currentType = btn.dataset.type;
      exchangeSection.classList.toggle('hidden', currentType !== 'exchange');
      groupbuySection.classList.toggle('hidden', currentType !== 'groupbuy');
      submitBtn.textContent =
        currentType === 'share'    ? '나눔 게시하기' :
        currentType === 'exchange' ? '교환 게시하기' : '공동구매 모집하기';
    });
  });

  // ── 설명 글자수 카운터 ──
  const descInput = document.getElementById('descInput');
  const descCount = document.getElementById('descCount');
  descInput.addEventListener('input', () => {
    descCount.textContent = descInput.value.length;
  });

  // ── 사진 업로드 ──
  const photoInput = document.getElementById('photoInput');
  const photoStrip = document.getElementById('photoStrip');
  const photoCount = document.getElementById('photoCount');

  photoInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    if (uploadedImages.length + files.length > 10) {
      alert('사진은 최대 10장까지 올릴 수 있어요.');
      return;
    }

    // FormData에 파일들 담아서 한 번에 업로드
    const fd = new FormData();
    files.forEach(f => fd.append('files', f));

    try {
      const res = await fetch(`${API_BASE}/upload-images`, { method:'POST', body:fd });
      if (!res.ok) throw new Error((await res.json()).detail || '업로드 실패');
      const data = await res.json();
      // 서버가 돌려준 파일명을 누적 저장
      uploadedImages = uploadedImages.concat(data.files);
      renderPhotos();
    } catch (err) {
      alert('이미지 업로드 실패: ' + err.message);
    } finally {
      // 같은 파일 다시 선택할 수 있게 초기화
      photoInput.value = '';
    }
  });

  function renderPhotos() {
    // 기존 미리보기 모두 제거 (첫 번째 <label> 입력기는 유지)
    photoStrip.querySelectorAll('.preview-thumb').forEach(n => n.remove());

    uploadedImages.forEach((name, idx) => {
      const div = document.createElement('div');
      div.className = 'preview-thumb shrink-0 w-20 h-20 rounded-xl relative ring-1 ring-black/5 overflow-hidden bg-cover bg-center';
      div.style.backgroundImage = `url("${API_BASE}/uploads/${name}")`;
      if (idx === 0) {
        const badge = document.createElement('span');
        badge.className = 'absolute top-1 left-1 text-[9px] font-bold bg-primary text-white px-1 py-0.5 rounded';
        badge.textContent = '대표';
        div.appendChild(badge);
      }
      const remove = document.createElement('button');
      remove.type = 'button';
      remove.className = 'absolute -top-1.5 -right-1.5 w-5 h-5 bg-on-surface text-white rounded-full flex items-center justify-center';
      remove.innerHTML = '<span class="material-symbols-outlined" style="font-size:13px">close</span>';
      remove.addEventListener('click', () => {
        uploadedImages.splice(idx, 1);
        renderPhotos();
      });
      div.appendChild(remove);
      photoStrip.appendChild(div);
    });

    photoCount.textContent = `${uploadedImages.length}/10`;
  }

  // ── 게시 버튼: 폼 → POST /posts ──
  submitBtn.addEventListener('click', async () => {
    const title = document.getElementById('titleInput').value.trim();
    const description = descInput.value.trim();
    const category = document.getElementById('categoryInput').value;
    const address = document.getElementById('addressInput').textContent.trim();

    // 기본 검증
    if (!title)       return alert('제목을 입력해 주세요.');
    if (!description) return alert('설명을 입력해 주세요.');

    const payload = {
      type: currentType,
      title, description, category,
      images: uploadedImages,
      address,
      lat: 37.5452, lng: 127.0865,  // 시연용 고정 좌표 (한들마을 3단지)
      author_id: CURRENT_USER_ID,
    };

    if (currentType === 'exchange') {
      const want = document.getElementById('exchangeWantInput').value.trim();
      if (!want) return alert('교환을 원하는 품목을 적어 주세요.');
      payload.exchange_want = want;
    }
    if (currentType === 'groupbuy') {
      const target = parseInt(document.getElementById('gbTargetInput').value, 10);
      const price  = parseInt(document.getElementById('gbPriceInput').value, 10);
      if (!target || target < 2) return alert('목표 인원을 2명 이상으로 입력해 주세요.');
      if (isNaN(price) || price < 0) return alert('1인당 가격을 입력해 주세요.');
      payload.gb_target = target;
      payload.gb_price  = price;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = '게시 중…';

    try {
      const res = await fetch(`${API_BASE}/posts`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error((await res.json()).detail || '게시 실패');
      const data = await res.json();
      alert('게시글이 등록되었습니다! (#' + data.id + ')');
      // 등록된 글의 상세 페이지로 이동
      const detailPage = currentType === 'groupbuy' ? 'Group_Buy_Detail.html' : 'Product_Detail.html';
      location.href = `${detailPage}?id=${data.id}`;
    } catch (err) {
      alert('게시 실패: ' + err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = currentType === 'groupbuy' ? '공동구매 모집하기'
                            : currentType === 'exchange' ? '교환 게시하기' : '나눔 게시하기';
    }
  });
</script>

</body>
</html>
